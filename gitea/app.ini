; Artea — Gitea runtime configuration for the stock gitea/gitea Docker image.
; Mounted read-only at /data/gitea/conf/app.ini (GITEA_CUSTOM=/data/gitea in the
; stock root image). See gitea/README.md for mount points and the env-var
; alternative. Keys verified against upstream v1.26.2 (custom/conf/app.example.ini
; and modules/setting/). All filesystem paths replicate the image's own generated
; config so everything lands on the /data volume.

; Branding: shown in page titles and on the (overridden) home page.
APP_NAME = Artea Package Registry
RUN_MODE = prod

[server]
; All data under the /data volume (the image does NOT default to /data on its own).
APP_DATA_PATH = /data/gitea
DOMAIN = localhost
HTTP_PORT = 3000
; CRITICAL: the public gateway URL, not the container URL. Package file/tarball
; URLs generated by Gitea must resolve through the gateway (ARCHITECTURE.md).
ROOT_URL = http://localhost:8080/
; 1.26 defaults to "auto" (derive public URL from the Host header). Force ROOT_URL
; so generated URLs are stable no matter how a request reaches Gitea.
PUBLIC_URL_DETECTION = never
; Packages-centric landing for anonymous "/" (org `artea` package list). Combined
; with REQUIRE_SIGNIN_VIEW it becomes the post-login redirect target.
LANDING_PAGE = /artea/-/packages
; De-git: no SSH clone UI; the registry only needs HTTP. (The image still runs an
; internal sshd; just never publish port 22.)
DISABLE_SSH = true
LFS_START_SERVER = false

[database]
; SQLite is sufficient for v1 (single instance, package metadata only).
DB_TYPE = sqlite3
PATH = /data/gitea/gitea.db
; WAL improves concurrent reads (npm/pip fetch bursts) over the sqlite default.
SQLITE_JOURNAL_MODE = WAL
LOG_SQL = false

[security]
; No web installer — the instance is configured entirely by this file + bootstrap.
INSTALL_LOCK = true
; Secrets are read from files so this config can stay in VCS and be mounted
; read-only. The files are generated by gitea/scripts/gen-secrets.sh and mounted
; from gitea/secrets/ (gitignored). Without these URIs Gitea would try to write
; generated secrets back into app.ini and fail on the read-only mount.
SECRET_KEY_URI = file:/data/gitea/secret_key
INTERNAL_TOKEN_URI = file:/data/gitea/internal_token

[oauth2]
; Same pattern as [security]: without the URI, Gitea generates JWT_SECRET on
; first boot and fatals trying to write it into the read-only app.ini. The
; file must hold RawURL-base64 of exactly 32 bytes (gen-secrets.sh does).
JWT_SECRET_URI = file:/data/gitea/jwt_secret
; Gitea sits behind the gateway (nginx); trust one proxy hop for client IPs.
; Reverse-proxy *authentication* stays disabled, so this only affects logging.
REVERSE_PROXY_LIMIT = 1
REVERSE_PROXY_TRUSTED_PROXIES = *

[service]
; Accounts are SSO- or admin-managed only (R1). NOTE: with this set, OIDC logins
; cannot auto-create accounts on first login. To allow Okta auto-provisioning,
; set DISABLE_REGISTRATION=false + ALLOW_ONLY_EXTERNAL_REGISTRATION=true instead
; (see gitea/README.md and docs/guides/okta.md).
DISABLE_REGISTRATION = true
SHOW_REGISTRATION_BUTTON = false
; Anonymous access: none, anywhere (ARCHITECTURE.md auth model).
REQUIRE_SIGNIN_VIEW = true
; Hide the issue/PR milestones dashboard page and its navbar entry.
SHOW_MILESTONES_DASHBOARD_PAGE = false
; Org creation is bootstrap/admin-only (admins bypass both switches).
DEFAULT_ALLOW_CREATE_ORGANIZATION = false
DEFAULT_KEEP_EMAIL_PRIVATE = true
; Do NOT disable ENABLE_BASIC_AUTHENTICATION (default true): npm/pip/twine and the
; gateway auth_request all authenticate with HTTP Basic user:PAT.

[admin]
; Belt-and-braces with DEFAULT_ALLOW_CREATE_ORGANIZATION above.
DISABLE_REGULAR_ORG_CREATION = true

[openid]
; Legacy OpenID 2.0 sign-in form fields — not used; SSO is OIDC via [auth sources].
ENABLE_OPENID_SIGNIN = false
ENABLE_OPENID_SIGNUP = false

[repository]
ROOT = /data/git/repositories
DEFAULT_BRANCH = main
; De-git: globally disable every repo unit except code and pulls. repo.pulls stays
; available because policy changes to artea/registry-policy go through PRs
; (ARCHITECTURE.md policy model). Issues/wiki/projects/releases/actions disappear
; from all repos AND from the navbar (templates check UnitGlobalDisabled).
DISABLED_REPO_UNITS = repo.issues,repo.ext_issues,repo.wiki,repo.ext_wiki,repo.projects,repo.releases,repo.actions
; New repos start with code + pulls only.
DEFAULT_REPO_UNITS = repo.code,repo.pulls
; No imports from external forges; also hides the "New Migration" UI.
DISABLE_MIGRATIONS = true
; De-git: hide stars UI and the "starred" profile tab.
DISABLE_STARS = true

[repository.local]
LOCAL_COPY_PATH = /data/gitea/tmp/local-repo

[repository.upload]
TEMP_PATH = /data/gitea/uploads

[mirror]
; No pull/push mirrors — Verdaccio/devpi do the caching, Gitea holds artifacts.
ENABLED = false

[packages]
; The reason this whole service exists.
ENABLED = true

[actions]
; No CI — Gitea is identity + package storage only.
ENABLED = false

[webhook]
; Gitea refuses webhooks to private/loopback hosts by default ("external").
; policy-sync is a private compose-network host, so it must be allowlisted or the
; policy push webhook (S1/S5/S10) is silently blocked. Listing only policy-sync
; also means no other (potentially exfiltrating) webhook target is reachable.
ALLOWED_HOST_LIST = policy-sync

[mailer]
; No outbound mail in v1.
ENABLED = false

[session]
; File-backed sessions survive container restarts (default provider is memory).
PROVIDER = file
PROVIDER_CONFIG = /data/gitea/sessions

[picture]
AVATAR_UPLOAD_PATH = /data/gitea/avatars
REPOSITORY_AVATAR_UPLOAD_PATH = /data/gitea/repo-avatars

[attachment]
PATH = /data/gitea/attachments

[indexer]
ISSUE_INDEXER_PATH = /data/gitea/indexers/issues.bleve

[lfs]
PATH = /data/git/lfs

[log]
; Console only — `docker compose logs gitea` is the single log stream.
MODE = console
LEVEL = info
ROOT_PATH = /data/gitea/log

[cron.update_checker]
; No phoning home to gitea.io for release checks.
ENABLED = false

[federation]
; Off by default upstream; pinned here because the architecture requires it.
ENABLED = false

[other]
; Trim public surface: no version banner, sitemap, or RSS/Atom feeds.
SHOW_FOOTER_VERSION = false
SHOW_FOOTER_TEMPLATE_LOAD_TIME = false
SHOW_FOOTER_POWERED_BY = false
ENABLE_SITEMAP = false
ENABLE_FEED = false
