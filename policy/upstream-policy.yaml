# Artea upstream package policy (all pull-through formats).
#
# Lives in the configured Gitea policy repo. Edit via PR; on push,
# policy-sync writes this file to /policy/upstream-policy.yaml for consumers
# that use the shared policy volume, serves it at /policy/upstream-policy.yaml
# for Kubernetes consumers, and applies the same values to format-specific
# policy engines such as the devpi constrained index.
#
# Schema:
#
#   upstream:
#     min_age: P3D       # optional ISO 8601 duration; use P0D to disable
#
# The value applies only to public pull-through packages. Private packages are
# routed to Gitea before the upstream caches are consulted.
upstream:
  min_age: P0D
