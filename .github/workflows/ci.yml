# Fast checks for every PR and main push (target: well under 5 minutes).
# Heavier pipelines live in images.yml (multi-arch GHCR builds) and
# kind-e2e.yml (full S1-S20 suite against the helm chart in kind).
# Actions are pinned to commit SHAs (R7 pin-everything; dependabot bumps them).
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  plugins:
    name: verdaccio plugins (tsc + vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: verdaccio/plugins
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: verdaccio/plugins/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build # tsc -p tsconfig.json in both workspace packages
      - run: pnpm test # vitest run in both workspace packages

  python:
    name: pytest (policy-sync + devpi entrypoint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.14'
          cache: pip
          # policy-sync is stdlib-only; the devpi plugin tests need the
          # same devpi-server pin as the image.
          cache-dependency-path: |
            .github/workflows/ci.yml
            devpi/Dockerfile
            devpi/artea_devpi_policy/pyproject.toml
      - name: install python test deps
        run: |
          DEVPI_SERVER_VERSION="$(sed -n 's/^ARG DEVPI_SERVER_VERSION=//p' devpi/Dockerfile)"
          python -m pip install pytest==9.0.3 "devpi-server==${DEVPI_SERVER_VERSION}" ./devpi/artea_devpi_policy
      - name: policy-sync tests
        working-directory: policy-sync
        run: python -m pytest
      - name: devpi entrypoint tests
        run: python -m pytest devpi/tests/ -q

  gitea-patch:
    name: gitea PKCE patch applies (dry-run)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: dry-run the patch queue against upstream Gitea at the pinned SOURCE_TAG
        # gitea/patches/ is the repo's only source modification (ADR-0009); validate
        # it still applies on every PR so a broken patch never merges green.
        run: |
          SOURCE_TAG="$(sed -n 's/^SOURCE_TAG=//p' gitea/UPSTREAM | head -n1)"
          [ -n "$SOURCE_TAG" ] || { echo "SOURCE_TAG not found in gitea/UPSTREAM" >&2; exit 1; }
          echo "==> upstream go-gitea/gitea $SOURCE_TAG"
          git clone --quiet --depth 1 --branch "$SOURCE_TAG" \
            https://github.com/go-gitea/gitea.git /tmp/gitea-src
          ./gitea/patches/apply-patches.sh --check /tmp/gitea-src

  lint:
    name: shell syntax + helm chart
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: bash -n every tracked shell script
        run: git ls-files '*.sh' | xargs -t -n1 bash -n
      - name: shellcheck tracked shell scripts
        run: git ls-files '*.sh' | xargs shellcheck -x --severity=warning
      - name: helm lint + template
        # uses the runner-provided helm
        run: |
          helm dependency update deploy/helm/artea
          helm lint deploy/helm/artea --values deploy/helm/artea/values-local.yaml
          helm template artea deploy/helm/artea \
            --namespace artea --values deploy/helm/artea/values-local.yaml > /dev/null
          if helm template artea deploy/helm/artea --namespace artea > /tmp/artea-default-template.out 2>&1; then
            echo "default values unexpectedly rendered without release image digests" >&2
            exit 1
          fi
          grep -q 'requires .digest' /tmp/artea-default-template.out
          if helm template artea deploy/helm/artea \
            --namespace artea --values deploy/helm/artea/values-local.yaml \
            --set devpi.image.digest=not-a-digest > /tmp/artea-bad-digest.out 2>&1; then
            echo "malformed image digest unexpectedly rendered" >&2
            exit 1
          fi
          grep -q 'invalid .digest' /tmp/artea-bad-digest.out
          prod_flags=(
            --namespace artea
            --set secrets.adminPassword=prod-admin-password
            --set secrets.dev1Password=prod-dev1-password
            --set secrets.devpiRootPassword=prod-devpi-password
            --set secrets.webhookSecret=prod-webhook-secret
            --set devpi.image.digest=sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
            --set policySync.image.digest=sha256:bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
            --set bootstrap.image.digest=sha256:cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
            --set verdaccio.pluginAssets.image.digest=sha256:dddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddd
          )
          if helm template artea deploy/helm/artea "${prod_flags[@]}" \
            --set bootstrap.emitCredentials=true > /tmp/artea-emit-creds.out 2>&1; then
            echo "production credential emission unexpectedly rendered" >&2
            exit 1
          fi
          grep -q 'bootstrap.emitCredentials=true is only allowed' /tmp/artea-emit-creds.out
          if helm template artea deploy/helm/artea \
            --namespace artea --values deploy/helm/artea/values-local.yaml \
            --set secrets.adminPassword= > /tmp/artea-empty-secret.out 2>&1; then
            echo "empty secret unexpectedly rendered" >&2
            exit 1
          fi
          grep -q 'secrets.adminPassword must not be empty' /tmp/artea-empty-secret.out
          if helm template artea deploy/helm/artea \
            --namespace artea --values deploy/helm/artea/values-local.yaml \
            --set global.baseUrl=https://registry.example.com \
            --set gateway.ingress.enabled=true \
            --set gateway.ingress.host=registry.example.com > /tmp/artea-ingress-no-tls.out 2>&1; then
            echo "ingress without TLS/externalTLS unexpectedly rendered" >&2
            exit 1
          fi
          grep -q 'gateway.ingress.tls or gateway.ingress.externalTLS=true' /tmp/artea-ingress-no-tls.out
