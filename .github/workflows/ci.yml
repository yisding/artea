# Fast checks for every PR and main push (target: well under 5 minutes).
# Heavier pipelines live in images.yml (multi-arch GHCR builds) and
# kind-e2e.yml (full S1-S16 suite against the helm chart in kind).
# Actions are pinned to commit SHAs (R7 pin-everything; dependabot bumps them).
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  plugins:
    name: verdaccio plugins (tsc + vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: verdaccio/plugins
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: verdaccio/plugins/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build # tsc -p tsconfig.json in both workspace packages
      - run: pnpm test # vitest run in both workspace packages

  python:
    name: pytest (policy-sync + devpi entrypoint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
          # the services are stdlib-only (AGENTS.md); the only dep is the
          # pytest pin below, so key the pip cache on this workflow file
          cache-dependency-path: .github/workflows/ci.yml
      - run: python -m pip install pytest==9.0.3
      - name: policy-sync tests
        working-directory: policy-sync
        run: python -m pytest
      - name: devpi entrypoint tests
        run: python -m pytest devpi/tests/ -q

  lint:
    name: shell syntax + helm chart
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: bash -n every tracked shell script
        run: git ls-files '*.sh' | xargs -t -n1 bash -n
      - name: helm lint + template
        # uses the runner-provided helm; the chart lands in a parallel PR, so
        # skip quietly until deploy/helm/artea exists
        run: |
          if [ ! -d deploy/helm/artea ]; then
            echo "deploy/helm/artea not present yet; skipping helm checks"
            exit 0
          fi
          helm dependency update deploy/helm/artea
          helm lint deploy/helm/artea
          helm template artea deploy/helm/artea --namespace artea > /dev/null
