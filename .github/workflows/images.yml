# Multi-arch (amd64+arm64) image builds pushed to
# ghcr.io/<owner>/artea-{devpi,policy-sync,bootstrap,verdaccio-assets}
# (docs/ARCHITECTURE.md "Kubernetes deployment"). Tags: latest on main,
# sha-<full sha> always, semver on v* tags. All four Artea-owned image
# Dockerfiles are required for release builds.
name: images

on:
  push:
    branches: [main]
    tags: ['v*']
    # the paths filter applies to branch pushes; tag pushes always build
    paths:
      - 'devpi/**'
      - 'policy-sync/**'
      - 'scripts/**'
      - 'policy/**'
      - 'verdaccio/plugins/**'
      - 'deploy/docker/**'
      - '.dockerignore'
      - '.github/workflows/images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: artea-${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: devpi
            context: devpi
            dockerfile: devpi/Dockerfile
          - name: policy-sync
            context: policy-sync
            dockerfile: policy-sync/Dockerfile
          - name: bootstrap
            context: .
            dockerfile: scripts/Dockerfile.bootstrap
          - name: verdaccio-assets
            context: verdaccio/plugins
            dockerfile: deploy/docker/verdaccio-assets/Dockerfile
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # the assets image carries pre-built plugins (dist/ + node_modules);
      # build them on the host first — the Dockerfile only COPYies
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        if: matrix.name == 'verdaccio-assets'
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: matrix.name == 'verdaccio-assets'
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: verdaccio/plugins/pnpm-lock.yaml
      - name: build verdaccio plugins
        if: matrix.name == 'verdaccio-assets'
        working-directory: verdaccio/plugins
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/artea-${{ matrix.name }}
          # `main` (branch tag) is the chart values' default tag; production
          # installs pin the image digest instead
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # plain manifest lists: provenance attestations get in the way of
          # digest pinning in the chart values
          provenance: false
          cache-from: type=gha,scope=artea-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=artea-${{ matrix.name }}
