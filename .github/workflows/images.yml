# Multi-arch (amd64+arm64) image builds pushed to
# ghcr.io/<owner>/artea-{devpi,policy-sync,bootstrap,verdaccio-assets}
# (docs/ARCHITECTURE.md "Kubernetes deployment"). Tags: latest on main,
# sha-<full sha> always, semver on v* tags. All four Artea-owned image
# Dockerfiles are required for release builds.
#
# The patched Gitea image (ghcr.io/<owner>/artea-gitea, ADR-0009) is built by the
# SEPARATE `gitea` + `gitea-manifest` jobs below: they clone upstream Gitea and
# apply gitea/patches/ rather than building a checked-in Dockerfile, building each
# arch natively (no QEMU) and merging into one multi-arch manifest with the same
# tag scheme.
name: images

on:
  push:
    branches: [main]
    tags: ['v*']
    # the paths filter applies to branch pushes; tag pushes always build
    paths:
      - 'devpi/**'
      - 'policy-sync/**'
      - 'scripts/**'
      - 'policy/**'
      - 'verdaccio/plugins/**'
      - 'deploy/docker/**'
      - 'gitea/patches/**'
      - 'gitea/build-image.sh'
      - 'gitea/UPSTREAM'
      - '.dockerignore'
      - '.github/workflows/images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: artea-${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: devpi
            context: devpi
            dockerfile: devpi/Dockerfile
          - name: policy-sync
            context: policy-sync
            dockerfile: policy-sync/Dockerfile
          - name: bootstrap
            context: .
            dockerfile: scripts/Dockerfile.bootstrap
          - name: verdaccio-assets
            context: verdaccio/plugins
            dockerfile: deploy/docker/verdaccio-assets/Dockerfile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # the assets image carries pre-built plugins (dist/ + node_modules);
      # build them on the host first — the Dockerfile only COPYies
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        if: matrix.name == 'verdaccio-assets'
        with:
          version: 11
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        if: matrix.name == 'verdaccio-assets'
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: verdaccio/plugins/pnpm-lock.yaml
      - name: build verdaccio plugins
        if: matrix.name == 'verdaccio-assets'
        working-directory: verdaccio/plugins
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/artea-${{ matrix.name }}
          # `main` (branch tag) is the chart values' default tag; production
          # installs pin the image digest instead
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # plain manifest lists: provenance attestations get in the way of
          # digest pinning in the chart values
          provenance: false
          cache-from: type=gha,scope=artea-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=artea-${{ matrix.name }}

  # The PATCHED Gitea image (ADR-0009): clone upstream at gitea/UPSTREAM's
  # SOURCE_TAG/SOURCE_COMMIT, apply gitea/patches/ (the PKCE patch), build Dockerfile.rootless.
  # Not a `build` matrix entry — there is no checked-in Dockerfile;
  # gitea/build-image.sh does the clone+patch+build. The published image must run
  # on both amd64 and arm64 (e.g. Graviton) nodes, but Gitea's rootless image is a
  # CGO/sqlite Go build whose arm64 stage would be painfully slow under QEMU — so
  # we build each arch NATIVELY (free arm64 runner on this public repo), push a
  # per-arch staging tag, and merge them into one manifest in `gitea-manifest`.
  gitea:
    name: artea-gitea (patched, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build + push per-arch patched Gitea image
        env:
          # build-image.sh defaults to ghcr.io/yisding/artea-gitea; pin to the
          # repo owner so forks publish under their own namespace
          ARTEA_GITEA_IMAGE: ghcr.io/${{ github.repository_owner }}/artea-gitea
          # single platform: a native runner builds its own arch (no emulation)
          ARTEA_GITEA_PLATFORMS: ${{ matrix.platform }}
        run: |
          # per-arch staging tag; gitea-manifest merges these into the real tags
          ./gitea/build-image.sh "sha-${{ github.sha }}-${{ matrix.arch }}" --push

  # Merge the per-arch images into one multi-arch manifest under the real tags
  # (sha-<full sha> always, latest on the default branch, and semver X.Y.Z + X.Y
  # on v* tags — matching the matrix tags). imagetools assembles from the pushed
  # per-arch manifests, no rebuild.
  gitea-manifest:
    name: artea-gitea (patched) manifest
    runs-on: ubuntu-latest
    needs: gitea
    timeout-minutes: 10
    steps:
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: assemble multi-arch manifest
        env:
          ARTEA_GITEA_IMAGE: ghcr.io/${{ github.repository_owner }}/artea-gitea
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITHUB_REF_SAFE: ${{ github.ref }}
          GITHUB_REF_NAME_SAFE: ${{ github.ref_name }}
          SHA: sha-${{ github.sha }}
        run: |
          tags=(-t "$ARTEA_GITEA_IMAGE:$SHA")
          if [ "$GITHUB_REF_SAFE" = "refs/heads/$DEFAULT_BRANCH" ]; then
            tags+=( -t "$ARTEA_GITEA_IMAGE:latest" )
          fi
          case "$GITHUB_REF_SAFE" in
            refs/tags/v*)
              ver="${GITHUB_REF_NAME_SAFE#v}"
              if printf '%s' "$ver" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                # X.Y.Z plus X.Y, matching docker/metadata-action's semver patterns
                tags+=( -t "$ARTEA_GITEA_IMAGE:$ver" -t "$ARTEA_GITEA_IMAGE:${ver%.*}" )
              else
                echo "::error::Release image tags must match vMAJOR.MINOR.PATCH." >&2
                exit 1
              fi
              ;;
          esac
          docker buildx imagetools create "${tags[@]}" \
            "$ARTEA_GITEA_IMAGE:$SHA-amd64" \
            "$ARTEA_GITEA_IMAGE:$SHA-arm64"

  verify-public:
    name: verify GHCR images are publicly pullable
    runs-on: ubuntu-latest
    needs: [build, gitea-manifest]
    timeout-minutes: 5
    steps:
      - name: anonymous pull check (docs advertise direct pulls; fail if any package is private)
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          owner="$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')"
          fail=0
          for pkg in artea-devpi artea-policy-sync artea-bootstrap artea-verdaccio-assets artea-gitea; do
            repo="${owner}/${pkg}"
            token="$(curl -fsS "https://ghcr.io/token?service=ghcr.io&scope=repository:${repo}:pull" 2>/dev/null | jq -r '.token // empty')"
            code="$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer ${token}" "https://ghcr.io/v2/${repo}/tags/list")"
            if [ "$code" = "200" ]; then
              echo "ok: ${repo} is publicly pullable"
            else
              echo "NOT PUBLIC: ${repo} (anonymous tags/list -> HTTP ${code})" >&2
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more GHCR packages are private, but docs/guides/aws-eks.md advertises direct anonymous pulls. Set each package's visibility to Public (GHCR Package settings -> Change visibility). Fresh GHCR packages default to private." >&2
            exit 1
          fi
