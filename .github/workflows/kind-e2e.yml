# Full S1-S17 e2e suite against the umbrella helm chart in a kind cluster
# (docs/ARCHITECTURE.md "Kubernetes deployment"): build the service images
# locally, kind-load them, helm-install deploy/helm/artea, wait for the
# bootstrap hook Job, then run e2e/run.sh through a gateway port-forward with
# BASE_URL + RUNTIME=k8s.
name: kind-e2e

on:
  pull_request:
    paths:
      - 'devpi/**'
      - 'policy-sync/**'
      - 'verdaccio/**'
      - 'gateway/**'
      - 'gitea/**'
      - 'scripts/**'
      - 'policy/**'
      - 'e2e/**'
      - 'deploy/**'
      - '.dockerignore'
      - '.github/workflows/kind-e2e.yml'
  push:
    branches: [main]
    paths:
      - 'devpi/**'
      - 'policy-sync/**'
      - 'verdaccio/**'
      - 'gateway/**'
      - 'gitea/**'
      - 'scripts/**'
      - 'policy/**'
      - 'e2e/**'
      - 'deploy/**'
      - '.dockerignore'
      - '.github/workflows/kind-e2e.yml'

permissions:
  contents: read

concurrency:
  group: kind-e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NAMESPACE: artea
  RELEASE: artea
  CHART_DIR: deploy/helm/artea
  KIND_CLUSTER: artea
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
  IMAGE_TAG: e2e

defaults:
  run:
    shell: bash

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: verdaccio/plugins/pnpm-lock.yaml

      - name: build verdaccio plugins
        working-directory: verdaccio/plugins
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: build images (single-arch, local only)
        run: |
          docker build -t "$IMAGE_PREFIX/artea-devpi:$IMAGE_TAG" devpi
          docker build -t "$IMAGE_PREFIX/artea-policy-sync:$IMAGE_TAG" policy-sync
          docker build -t "$IMAGE_PREFIX/artea-bootstrap:$IMAGE_TAG" \
            -f scripts/Dockerfile.bootstrap .
          # context = the built plugin workspace, NOT the repo root: the
          # image must carry /plugins/verdaccio-<name> for verdaccio's loader
          docker build -t "$IMAGE_PREFIX/artea-verdaccio-assets:$IMAGE_TAG" \
            -f deploy/docker/verdaccio-assets/Dockerfile verdaccio/plugins

      - name: create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: artea

      - name: load images into kind
        run: |
          for name in devpi policy-sync bootstrap verdaccio-assets; do
            ref="$IMAGE_PREFIX/artea-$name:$IMAGE_TAG"
            if docker image inspect "$ref" > /dev/null 2>&1; then
              kind load docker-image "$ref" --name "$KIND_CLUSTER"
            fi
          done

      - name: helm install (chart + CI overrides)
        # values-local.yaml (colima/local contract) is layered first when it
        # exists; the CI overlay then forces the images just built and loaded
        # above, pullPolicy Never, and no ingress. Keys match the chart's
        # values.yaml: {devpi,policySync,bootstrap}.image.* plus
        # verdaccio.pluginAssets.image.* and gateway.ingress.enabled.
        run: |
          helm dependency update "$CHART_DIR"
          cat > "$RUNNER_TEMP/ci-values.yaml" <<EOF
          devpi:
            image:
              repository: $IMAGE_PREFIX/artea-devpi
              tag: $IMAGE_TAG
              pullPolicy: Never
          policySync:
            image:
              repository: $IMAGE_PREFIX/artea-policy-sync
              tag: $IMAGE_TAG
              pullPolicy: Never
          bootstrap:
            emitCredentials: true
            image:
              repository: $IMAGE_PREFIX/artea-bootstrap
              tag: $IMAGE_TAG
              pullPolicy: Never
          verdaccio:
            pluginAssets:
              image:
                repository: $IMAGE_PREFIX/artea-verdaccio-assets
                tag: $IMAGE_TAG
                pullPolicy: Never
          gateway:
            replicas: 1
            ingress:
              enabled: false
          EOF
          args=()
          if [ -f "$CHART_DIR/values-local.yaml" ]; then
            args+=(-f "$CHART_DIR/values-local.yaml")
          fi
          args+=(-f "$RUNNER_TEMP/ci-values.yaml")
          # helm blocks on the post-install bootstrap hook Job as well
          helm upgrade --install "$RELEASE" "$CHART_DIR" \
            --namespace "$NAMESPACE" --create-namespace \
            "${args[@]}" --wait --timeout 10m

      - name: wait for the bootstrap hook Job
        id: bootstrap
        run: |
          job=$(kubectl get jobs -n "$NAMESPACE" -o name | grep bootstrap | head -1 || true)
          if [ -z "$job" ]; then
            echo "ERROR: no bootstrap Job found in namespace $NAMESPACE" >&2
            kubectl get jobs -n "$NAMESPACE" >&2 || true
            exit 1
          fi
          echo "job=$job" >> "$GITHUB_OUTPUT"
          kubectl wait -n "$NAMESPACE" --for=condition=complete --timeout=300s "$job"

      - name: extract credentials from the bootstrap logs
        # contract: the k8s bootstrap prints the same KEY=value block that
        # scripts/bootstrap.sh writes to e2e/tmp/credentials.env only when
        # bootstrap.emitCredentials=true, framed by '----- BEGIN/END ARTEA
        # CREDENTIALS -----' markers (exact spelling in scripts/bootstrap.sh
        # emit_credentials, extracted the same way by scripts/k8s-e2e.sh); the
        # fallback greps the known keys out of the raw logs
        run: |
          mkdir -p e2e/tmp # before umask: 177 would strip the dir's x bit
          umask 177
          kubectl logs -n "$NAMESPACE" "${{ steps.bootstrap.outputs.job }}" --tail=-1 \
            > "$RUNNER_TEMP/bootstrap.log"
          sed -n '/^----- BEGIN ARTEA CREDENTIALS -----$/,/^----- END ARTEA CREDENTIALS -----$/p' \
            "$RUNNER_TEMP/bootstrap.log" | sed '1d;$d' > "$RUNNER_TEMP/creds.env"
          if [ ! -s "$RUNNER_TEMP/creds.env" ]; then
            grep -E '^(GATEWAY_URL|ARTEA_NAMESPACE|POLICY_REPO|ARTEA_ADMIN_USER|ARTEA_ADMIN_PASSWORD|ARTEA_ADMIN_TOKEN|DEV1_USER|DEV1_PASSWORD|DEV1_TOKEN|POLICY_SYNC_TOKEN)=' \
              "$RUNNER_TEMP/bootstrap.log" > "$RUNNER_TEMP/creds.env" || true
          fi
          if [ ! -s "$RUNNER_TEMP/creds.env" ]; then
            echo "ERROR: no credentials block in the bootstrap Job logs; bootstrap.emitCredentials must be true for e2e" >&2
            exit 1
          fi
          # throwaway cluster-local credentials, but mask them in logs anyway
          while IFS='=' read -r key value; do
            case "$key" in
              *PASSWORD | *TOKEN)
                if [ -n "$value" ]; then echo "::add-mask::$value"; fi
                ;;
            esac
          done < "$RUNNER_TEMP/creds.env"
          cat "$RUNNER_TEMP/creds.env" > e2e/tmp/credentials.env
          # the suite reaches the cluster through the port-forward below
          echo "GATEWAY_URL=http://localhost:8080" >> e2e/tmp/credentials.env
          echo "wrote e2e/tmp/credentials.env ($(grep -c '=' e2e/tmp/credentials.env) entries)"

      - name: port-forward the gateway service
        # artea-gateway is the chart's fixed naming contract; the grep is a
        # fallback in case the contract shifts
        run: |
          svc=$(kubectl get svc -n "$NAMESPACE" artea-gateway -o name 2> /dev/null \
            || kubectl get svc -n "$NAMESPACE" -o name | grep gateway | head -1 || true)
          if [ -z "$svc" ]; then
            echo "ERROR: no gateway Service in namespace $NAMESPACE" >&2
            kubectl get svc -n "$NAMESPACE" >&2 || true
            exit 1
          fi
          kubectl port-forward -n "$NAMESPACE" "$svc" 8080:80 \
            > "$RUNNER_TEMP/port-forward.log" 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null "http://localhost:8080/-/artea-gateway/health"; then
              echo "gateway reachable through the port-forward ($svc)"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: gateway not reachable through the port-forward after 60s" >&2
          cat "$RUNNER_TEMP/port-forward.log" >&2 || true
          exit 1

      - name: run the e2e suite (S1-S16)
        timeout-minutes: 12
        env:
          BASE_URL: http://localhost:8080
          RUNTIME: k8s
          # contract for the suite's kubectl-based steps (S1 health, S15 wipe);
          # K8S_NAMESPACE is the variable e2e/run.sh + scripts own
          K8S_NAMESPACE: artea
          # webhook target as bootstrap wired it (S1 asserts this exact URL)
          POLICY_SYNC_URL: http://artea-policy-sync:8920
        run: ./e2e/run.sh

      - name: diagnostics on failure
        if: failure()
        run: |
          diag="$RUNNER_TEMP/diag"
          mkdir -p "$diag"
          {
            echo "=== kubectl get all -o wide ==="
            kubectl get all -n "$NAMESPACE" -o wide || true
            echo "=== pvc / jobs / configmaps ==="
            kubectl get pvc,jobs,cm -n "$NAMESPACE" || true
            echo "=== events ==="
            kubectl get events -n "$NAMESPACE" --sort-by=.lastTimestamp || true
          } | tee "$diag/cluster-state.txt"
          kubectl describe pods -n "$NAMESPACE" | tee "$diag/describe-pods.txt" || true
          redact='s#(https?://[^/:@[:space:]]+:)[^@[:space:]]+@#\1<redacted>@#g; s#((PASSWORD|TOKEN|PAT|_authToken)[A-Za-z0-9_:-]*=)[^[:space:]]+#\1<redacted>#g'
          for pod in $(kubectl get pods -n "$NAMESPACE" -o name 2>/dev/null); do
            out="$diag/logs-${pod#pod/}.txt"
            kubectl logs -n "$NAMESPACE" "$pod" --all-containers --prefix --tail=-1 \
              2>&1 | sed -E "$redact" > "$out" || true
            echo "--- previous (if restarted) ---" >> "$out"
            kubectl logs -n "$NAMESPACE" "$pod" --all-containers --prefix --previous --tail=-1 \
              2>&1 | sed -E "$redact" >> "$out" || true
          done
          job=$(kubectl get jobs -n "$NAMESPACE" -o name | grep bootstrap | head -1 || true)
          if [ -n "$job" ]; then
            # redact the credentials block before logging/archiving
            kubectl logs -n "$NAMESPACE" "$job" --tail=-1 2>&1 \
              | sed -E "$redact" \
              | tee "$diag/bootstrap-job.log" || true
          fi
          if find e2e/tmp -path '*/logs/*' -type f -print -quit 2> /dev/null | grep -q .; then
            find e2e/tmp -path '*/logs/*' -type f -print | while IFS= read -r file; do
              rel="${file#e2e/tmp/}"
              mkdir -p "$diag/e2e-logs/$(dirname "$rel")"
              sed -E "$redact" "$file" > "$diag/e2e-logs/$rel" || true
            done
          fi
          cp "$RUNNER_TEMP/port-forward.log" "$diag/" 2> /dev/null || true

      - name: upload diagnostics artifact
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kind-e2e-diagnostics
          # never include raw e2e/tmp logs or e2e/tmp/credentials.env here
          path: |
            ${{ runner.temp }}/diag/
          retention-days: 7
          if-no-files-found: ignore
