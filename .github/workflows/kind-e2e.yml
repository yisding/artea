# Full S1-S20 e2e suite against the umbrella helm chart in kind clusters
# (docs/ARCHITECTURE.md "Kubernetes deployment"): build the service images
# locally, kind-load them, helm-install deploy/helm/artea, wait for the
# bootstrap hook Job, then run e2e/run.sh through a gateway port-forward with
# BASE_URL. The slow fail-closed recovery scenario runs as a
# parallel shard with CI-only policy timing overrides.
name: kind-e2e

on:
  pull_request:
    paths:
      - 'devpi/**'
      - 'policy-sync/**'
      - 'verdaccio/**'
      - 'gateway/**'
      - 'gitea/**'
      - 'scripts/**'
      - 'policy/**'
      - 'e2e/**'
      - 'deploy/**'
      - '.dockerignore'
      - '.github/workflows/kind-e2e.yml'
  push:
    branches: [main]
    paths:
      - 'devpi/**'
      - 'policy-sync/**'
      - 'verdaccio/**'
      - 'gateway/**'
      - 'gitea/**'
      - 'scripts/**'
      - 'policy/**'
      - 'e2e/**'
      - 'deploy/**'
      - '.dockerignore'
      - '.github/workflows/kind-e2e.yml'

permissions:
  contents: read

concurrency:
  group: kind-e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NAMESPACE: artea
  RELEASE: artea
  CHART_DIR: deploy/helm/artea
  KIND_CLUSTER: artea
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
  IMAGE_TAG: e2e

defaults:
  run:
    shell: bash

jobs:
  e2e-shard:
    name: e2e (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: main
            scenarios: S1,S2,S3,S4,S5,S6,S7,S8,S9,S10,S11,S12,S13,S14,S16,S17,S18,S19,S20
            policy_grace_secs: "60"
            policy_poll_ms: "10000"
            policy_fail_grace_ms: "60000"
          - shard: fail-closed
            scenarios: S15
            policy_grace_secs: "3"
            policy_poll_ms: "500"
            policy_fail_grace_ms: "3000"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: verdaccio/plugins/pnpm-lock.yaml
      - id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: e2e/run.sh

      - name: cache helm dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            deploy/helm/artea/charts
            ~/.cache/helm
          key: helm-${{ runner.os }}-${{ hashFiles('deploy/helm/artea/Chart.lock') }}

      - name: cache e2e python venv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: e2e/tmp/venv
          key: e2e-venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('e2e/run.sh') }}

      - name: build verdaccio plugins
        working-directory: verdaccio/plugins
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Build + load (for kind) all four service images. The {name, context,
      # dockerfile} triples below are the same list images.yml builds; the
      # shared .github/actions/build-image step keeps provenance/cache identical
      # across both workflows. verdaccio-assets is the one special case: its
      # context is the *built* plugin workspace (built by the "build verdaccio
      # plugins" step above), NOT the repo root — the image only COPYies the
      # already-built /plugins/verdaccio-<name> dirs verdaccio's loader needs.
      - name: build devpi image
        uses: ./.github/actions/build-image
        with:
          name: devpi
          context: devpi
          dockerfile: devpi/Dockerfile
          image-prefix: ${{ env.IMAGE_PREFIX }}
          image-tag: ${{ env.IMAGE_TAG }}

      - name: build policy-sync image
        uses: ./.github/actions/build-image
        with:
          name: policy-sync
          context: policy-sync
          dockerfile: policy-sync/Dockerfile
          image-prefix: ${{ env.IMAGE_PREFIX }}
          image-tag: ${{ env.IMAGE_TAG }}

      - name: build bootstrap image
        uses: ./.github/actions/build-image
        with:
          name: bootstrap
          context: .
          dockerfile: scripts/Dockerfile.bootstrap
          image-prefix: ${{ env.IMAGE_PREFIX }}
          image-tag: ${{ env.IMAGE_TAG }}

      - name: build verdaccio assets image
        uses: ./.github/actions/build-image
        with:
          name: verdaccio-assets
          context: verdaccio/plugins
          dockerfile: deploy/docker/verdaccio-assets/Dockerfile
          image-prefix: ${{ env.IMAGE_PREFIX }}
          image-tag: ${{ env.IMAGE_TAG }}

      - name: create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: artea

      - name: load images into kind
        run: |
          for name in devpi policy-sync bootstrap verdaccio-assets; do
            ref="$IMAGE_PREFIX/artea-$name:$IMAGE_TAG"
            if docker image inspect "$ref" > /dev/null 2>&1; then
              kind load docker-image "$ref" --name "$KIND_CLUSTER"
            fi
          done

      - name: helm install (chart + CI overrides)
        # values-local.yaml (colima/local contract) is layered first when it
        # exists; the CI overlay then forces the images just built and loaded
        # above, pullPolicy Never, no ingress, and the STOCK Gitea image. Keys
        # match the chart's values.yaml: {devpi,policySync,bootstrap}.image.* plus
        # verdaccio.pluginAssets.image.* and gateway.ingress.enabled. The
        # Verdaccio policy timings shorten only the CI fail-closed probe.
        # Gitea: values-local pins the patched :local image (ADR-0009), which
        # this job never builds/loads (PKCE needs a live IdP e2e lacks, and a
        # per-run Gitea Go build is the cost ADR-0009 avoids); clearing
        # fullOverride falls back to the stock pin in values.yaml.
        run: |
          helm repo add verdaccio https://charts.verdaccio.org --force-update >/dev/null
          helm dependency build "$CHART_DIR"
          cat > "$RUNNER_TEMP/ci-values.yaml" <<EOF
          devpi:
            image:
              repository: $IMAGE_PREFIX/artea-devpi
              tag: $IMAGE_TAG
              pullPolicy: Never
          policySync:
            image:
              repository: $IMAGE_PREFIX/artea-policy-sync
              tag: $IMAGE_TAG
              pullPolicy: Never
          bootstrap:
            emitCredentials: true
            image:
              repository: $IMAGE_PREFIX/artea-bootstrap
              tag: $IMAGE_TAG
              pullPolicy: Never
          verdaccio:
            pluginAssets:
              image:
                repository: $IMAGE_PREFIX/artea-verdaccio-assets
                tag: $IMAGE_TAG
                pullPolicy: Never
            arteaPolicy:
              pollIntervalMs: ${{ matrix.policy_poll_ms }}
              failGraceMs: ${{ matrix.policy_fail_grace_ms }}
          gateway:
            replicas: 1
            ingress:
              enabled: false
          gitea:
            image:
              # revert values-local's patched :local override → stock pin
              # (docker.gitea.com/gitea:<values.yaml tag>-rootless), pullable
              fullOverride: ""
              pullPolicy: IfNotPresent
          EOF
          args=()
          if [ -f "$CHART_DIR/values-local.yaml" ]; then
            args+=(-f "$CHART_DIR/values-local.yaml")
          fi
          args+=(-f "$RUNNER_TEMP/ci-values.yaml")
          # helm blocks on the post-install bootstrap hook Job as well. The
          # stack normally goes Ready in ~90s; 5m leaves ~3x headroom for a slow
          # registry pull while surfacing a stuck/broken install (e.g. an
          # unpullable image) in half the time the old 10m took.
          helm upgrade --install "$RELEASE" "$CHART_DIR" \
            --namespace "$NAMESPACE" --create-namespace \
            "${args[@]}" --wait --timeout 5m

      - name: wait for the bootstrap hook Job
        id: bootstrap
        run: |
          job=$(kubectl get jobs -n "$NAMESPACE" -o name | grep bootstrap | head -1 || true)
          if [ -z "$job" ]; then
            echo "ERROR: no bootstrap Job found in namespace $NAMESPACE" >&2
            kubectl get jobs -n "$NAMESPACE" >&2 || true
            exit 1
          fi
          echo "job=$job" >> "$GITHUB_OUTPUT"
          kubectl wait -n "$NAMESPACE" --for=condition=complete --timeout=300s "$job"

      - name: extract credentials from the bootstrap logs
        # contract: the k8s bootstrap prints the same KEY=value block that
        # scripts/bootstrap.sh writes to e2e/tmp/credentials.env only when
        # bootstrap.emitCredentials=true, framed by '----- BEGIN/END ARTEA
        # CREDENTIALS -----' markers (exact spelling in scripts/bootstrap.sh
        # emit_credentials, extracted the same way by scripts/k8s-e2e.sh); the
        # fallback greps the known keys out of the raw logs
        run: |
          mkdir -p e2e/tmp # before umask: 177 would strip the dir's x bit
          umask 177
          kubectl logs -n "$NAMESPACE" "${{ steps.bootstrap.outputs.job }}" --tail=-1 \
            > "$RUNNER_TEMP/bootstrap.log"
          sed -n '/^----- BEGIN ARTEA CREDENTIALS -----$/,/^----- END ARTEA CREDENTIALS -----$/p' \
            "$RUNNER_TEMP/bootstrap.log" | sed '1d;$d' > "$RUNNER_TEMP/creds.env"
          if [ ! -s "$RUNNER_TEMP/creds.env" ]; then
            grep -E '^(GATEWAY_URL|ARTEA_NAMESPACE|POLICY_REPO|ARTEA_ADMIN_USER|ARTEA_ADMIN_PASSWORD|ARTEA_ADMIN_TOKEN|DEV1_USER|DEV1_PASSWORD|DEV1_TOKEN|POLICY_SYNC_TOKEN)=' \
              "$RUNNER_TEMP/bootstrap.log" > "$RUNNER_TEMP/creds.env" || true
          fi
          if [ ! -s "$RUNNER_TEMP/creds.env" ]; then
            echo "ERROR: no credentials block in the bootstrap Job logs; bootstrap.emitCredentials must be true for e2e" >&2
            exit 1
          fi
          # throwaway cluster-local credentials, but mask them in logs anyway
          while IFS='=' read -r key value; do
            case "$key" in
              *PASSWORD | *TOKEN)
                if [ -n "$value" ]; then echo "::add-mask::$value"; fi
                ;;
            esac
          done < "$RUNNER_TEMP/creds.env"
          cat "$RUNNER_TEMP/creds.env" > e2e/tmp/credentials.env
          # the suite reaches the cluster through the port-forward below
          echo "GATEWAY_URL=http://localhost:8080" >> e2e/tmp/credentials.env
          echo "wrote e2e/tmp/credentials.env ($(grep -c '=' e2e/tmp/credentials.env) entries)"

      - name: port-forward the gateway service
        # artea-gateway is the chart's fixed naming contract; the grep is a
        # fallback in case the contract shifts
        run: |
          svc=$(kubectl get svc -n "$NAMESPACE" artea-gateway -o name 2> /dev/null \
            || kubectl get svc -n "$NAMESPACE" -o name | grep gateway | head -1 || true)
          if [ -z "$svc" ]; then
            echo "ERROR: no gateway Service in namespace $NAMESPACE" >&2
            kubectl get svc -n "$NAMESPACE" >&2 || true
            exit 1
          fi
          kubectl port-forward -n "$NAMESPACE" "$svc" 8080:80 \
            > "$RUNNER_TEMP/port-forward.log" 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null "http://localhost:8080/-/artea-gateway/health"; then
              echo "gateway reachable through the port-forward ($svc)"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: gateway not reachable through the port-forward after 60s" >&2
          cat "$RUNNER_TEMP/port-forward.log" >&2 || true
          exit 1

      - name: run the e2e suite (${{ matrix.scenarios }})
        timeout-minutes: 12
        env:
          BASE_URL: http://localhost:8080
          # contract for the suite's kubectl-based steps (S1 health, S15 wipe);
          # K8S_NAMESPACE is the variable e2e/run.sh + scripts own
          K8S_NAMESPACE: artea
          # webhook target as bootstrap wired it (S1 asserts this exact URL)
          POLICY_SYNC_URL: http://artea-policy-sync:8920
          E2E_SCENARIOS: ${{ matrix.scenarios }}
          POLICY_GRACE_SECS: ${{ matrix.policy_grace_secs }}
        run: ./e2e/run.sh

      - name: diagnostics on failure
        if: failure()
        run: |
          diag="$RUNNER_TEMP/diag"
          mkdir -p "$diag"
          {
            echo "=== kubectl get all -o wide ==="
            kubectl get all -n "$NAMESPACE" -o wide || true
            echo "=== pvc / jobs / configmaps ==="
            kubectl get pvc,jobs,cm -n "$NAMESPACE" || true
            echo "=== events ==="
            kubectl get events -n "$NAMESPACE" --sort-by=.lastTimestamp || true
          } | tee "$diag/cluster-state.txt"
          kubectl describe pods -n "$NAMESPACE" | tee "$diag/describe-pods.txt" || true
          redact='s#(https?://[^/:@[:space:]]+:)[^@[:space:]]+@#\1<redacted>@#g; s#((PASSWORD|TOKEN|PAT|_authToken)[A-Za-z0-9_:-]*=)[^[:space:]]+#\1<redacted>#g'
          for pod in $(kubectl get pods -n "$NAMESPACE" -o name 2>/dev/null); do
            out="$diag/logs-${pod#pod/}.txt"
            kubectl logs -n "$NAMESPACE" "$pod" --all-containers --prefix --tail=-1 \
              2>&1 | sed -E "$redact" > "$out" || true
            echo "--- previous (if restarted) ---" >> "$out"
            kubectl logs -n "$NAMESPACE" "$pod" --all-containers --prefix --previous --tail=-1 \
              2>&1 | sed -E "$redact" >> "$out" || true
          done
          job=$(kubectl get jobs -n "$NAMESPACE" -o name | grep bootstrap | head -1 || true)
          if [ -n "$job" ]; then
            # redact the credentials block before logging/archiving
            kubectl logs -n "$NAMESPACE" "$job" --tail=-1 2>&1 \
              | sed -E "$redact" \
              | tee "$diag/bootstrap-job.log" || true
          fi
          if find e2e/tmp -path '*/logs/*' -type f -print -quit 2> /dev/null | grep -q .; then
            find e2e/tmp -path '*/logs/*' -type f -print | while IFS= read -r file; do
              rel="${file#e2e/tmp/}"
              mkdir -p "$diag/e2e-logs/$(dirname "$rel")"
              sed -E "$redact" "$file" > "$diag/e2e-logs/$rel" || true
            done
          fi
          cp "$RUNNER_TEMP/port-forward.log" "$diag/" 2> /dev/null || true

      - name: upload diagnostics artifact
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kind-e2e-diagnostics-${{ matrix.shard }}
          # never include raw e2e/tmp logs or e2e/tmp/credentials.env here
          path: |
            ${{ runner.temp }}/diag/
          retention-days: 7
          if-no-files-found: ignore

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    needs: e2e-shard
    if: always()
    steps:
      - name: verify shards
        run: |
          if [ "${{ needs['e2e-shard'].result }}" != "success" ]; then
            echo "kind e2e shards finished with: ${{ needs['e2e-shard'].result }}" >&2
            exit 1
          fi
