# Artea v1 stack — see docs/ARCHITECTURE.md ("Fixed contracts" is binding).
# Only the gateway publishes a port; everything else is internal-only.
# All pins and secrets come from .env (.env.example documents them).

name: artea

services:
  gateway:
    image: nginx:${NGINX_VERSION}
    container_name: gateway
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    # nginx itself resolves upstreams per-request (Docker DNS) and would start
    # fine alone; the dependency just makes `make up` mean "stack usable".
    depends_on:
      gitea:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/-/artea-gateway/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  gitea:
    image: gitea/gitea:${GITEA_VERSION}
    container_name: gitea
    # HARD RULE (gitea/README.md): NO GITEA__section__key env vars here — the
    # image entrypoint rewrites app.ini in place when they exist, which fails
    # against the read-only mount. All config lives in the mounted file.
    volumes:
      - gitea-data:/data
      - ./gitea/app.ini:/data/gitea/conf/app.ini:ro
      - ./gitea/custom/templates:/data/gitea/templates:ro
      # generated by gitea/scripts/gen-secrets.sh (make up runs it)
      - ./gitea/secrets/secret_key:/data/gitea/secret_key:ro
      - ./gitea/secrets/internal_token:/data/gitea/internal_token:ro
      - ./gitea/secrets/jwt_secret:/data/gitea/jwt_secret:ro
    healthcheck:
      # /api/healthz is registered before the auth middleware, so it works
      # despite REQUIRE_SIGNIN_VIEW = true
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/healthz"]
      interval: 10s
      timeout: 3s
      start_period: 60s
      retries: 5
    restart: unless-stopped

  verdaccio:
    image: verdaccio/verdaccio:${VERDACCIO_VERSION}
    container_name: verdaccio
    volumes:
      - ./verdaccio/config.yaml:/verdaccio/conf/config.yaml:ro
      # whole directory, never a single plugin: pnpm uses relative symlinks
      # into plugins/node_modules/.pnpm (verdaccio/README.md). Run
      # `make plugins` before first up — dist/ and node_modules are gitignored.
      - ./verdaccio/plugins:/verdaccio/plugins:ro
      - verdaccio-storage:/verdaccio/storage
      - policy-data:/policy:ro
    depends_on:
      gitea:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:4873/-/ping"]
      interval: 10s
      timeout: 3s
      start_period: 30s
      retries: 5
    restart: unless-stopped

  devpi:
    build:
      context: ./devpi
      args:
        DEVPI_SERVER_VERSION: ${DEVPI_SERVER_VERSION}
        DEVPI_CLIENT_VERSION: ${DEVPI_CLIENT_VERSION}
        DEVPI_CONSTRAINED_VERSION: ${DEVPI_CONSTRAINED_VERSION}
    container_name: devpi
    environment:
      DEVPI_ROOT_PASSWORD: ${DEVPI_ROOT_PASSWORD}
    volumes:
      - devpi-data:/devpi/server
    # healthcheck (GET /+status) is baked into the image
    restart: unless-stopped

  policy-sync:
    build:
      context: ./policy-sync
    container_name: policy-sync
    environment:
      # minted by scripts/bootstrap.sh (which rewrites .env and recreates this
      # container); with the placeholder the service idles, syncs failing
      POLICY_SYNC_TOKEN: ${POLICY_SYNC_TOKEN:-bootstrap-pending}
      POLICY_WEBHOOK_SECRET: ${POLICY_WEBHOOK_SECRET}
      DEVPI_ROOT_PASSWORD: ${DEVPI_ROOT_PASSWORD}
    volumes:
      - policy-data:/policy
    depends_on:
      gitea:
        condition: service_healthy
      devpi:
        condition: service_healthy
    # healthcheck (GET /healthz) is baked into the image
    restart: unless-stopped

volumes:
  gitea-data:        # store of record: users, repos, private packages
  verdaccio-storage: # disposable npm pull-through cache
  devpi-data:        # disposable pypi pull-through cache
  policy-data:       # npm-rules.yaml handoff: policy-sync writes, verdaccio reads
