# policy-sync: receives the Gitea push webhook, fetches the policy files, and
# (K8s mode) serves npm-rules.yaml over HTTP to the Verdaccio filter plugin —
# GET /policy/npm-rules.yaml — instead of writing to a shared volume (no RWX).
# Constraints are still pushed into devpi. POLICY_SYNC_TOKEN is minted by the
# bootstrap Job, which patches the artea-policy-sync Secret and restarts this
# Deployment; until then the service idles with failing syncs.
{{- if .Values.policySync.persistence.enabled }}
# Last-known-good policy state. policy-sync holds OSV malicious-package blocks
# only in memory; after a restart that memory is empty until the first sync from
# Gitea succeeds, during which OSV decisions would fail OPEN. This small PVC
# persists the last successfully-synced policy.toml (PARSED_POLICY_FILE_PATH) so
# the OSV fallback fails CLOSED across restarts.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "artea.fullname" "policy-sync-state" }}
  labels:
    {{- include "artea.labels" (dict "ctx" $ "component" "policy-sync") | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.policySync.persistence.size }}
  {{- with .Values.policySync.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "artea.fullname" "policy-sync" }}
  labels:
    {{- include "artea.labels" (dict "ctx" $ "component" "policy-sync") | nindent 4 }}
spec:
  replicas: 1
  {{- if .Values.policySync.persistence.enabled }}
  # the state PVC is ReadWriteOnce, so never run two pods at once
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "artea.selectorLabels" (dict "ctx" $ "component" "policy-sync") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "artea.selectorLabels" (dict "ctx" $ "component" "policy-sync") | nindent 8 }}
      annotations:
        # roll on webhook-secret/devpi-password changes (the bootstrap-managed
        # token Secret is excluded: bootstrap restarts the Deployment itself)
        checksum/secrets: {{ printf "%s/%s" .Values.secrets.webhookSecret .Values.secrets.devpiRootPassword | sha256sum }}
    spec:
      {{- if .Values.policySync.persistence.enabled }}
      securityContext:
        # make the state PVC writable by the policysync user (uid/gid 8920)
        fsGroup: 8920
      {{- end }}
      containers:
        - name: policy-sync
          {{- include "artea.containerImage" .Values.policySync.image | nindent 10 }}
          env:
            # HTTP-only mode: no /policy volume in K8s — an unset path would
            # make every sync fail trying to write /policy/npm-rules.yaml
            - name: POLICY_FILE_PATH
              value: ""
            {{- if .Values.policySync.persistence.enabled }}
            # Persist the last-known-good parsed policy onto the state PVC so OSV
            # blocks fail CLOSED across a restart (see the PVC comment above).
            - name: PARSED_POLICY_FILE_PATH
              value: /var/lib/artea/policy-state/policy.toml
            {{- end }}
            - name: GITEA_URL
              value: {{ include "artea.giteaUrl" . | quote }}
            - name: DEVPI_URL
              value: {{ include "artea.devpiUrl" . | quote }}
            - name: ARTEA_NAMESPACE
              value: {{ include "artea.privateNamespace" . | quote }}
            # PEP 700 enrichment: PyPI JSON source for public upload-time/size.
            # Keep in sync with the devpi constrained index's pypi_json_url.
            - name: PYPI_JSON_URL
              value: {{ .Values.policySync.pypiJsonUrl | quote }}
            - name: OSV_API_URL
              value: {{ .Values.policySync.osvApiUrl | quote }}
            - name: POLICY_SYNC_POLL_SECONDS
              value: {{ .Values.policySync.pollSeconds | quote }}
            {{- include "artea.secretEnv" (dict "name" "POLICY_SYNC_TOKEN" "secret" "policy-sync" "key" "POLICY_SYNC_TOKEN") | nindent 12 }}
            {{- include "artea.secretEnv" (dict "name" "POLICY_WEBHOOK_SECRET" "secret" "secrets" "key" "POLICY_WEBHOOK_SECRET") | nindent 12 }}
            {{- include "artea.secretEnv" (dict "name" "DEVPI_ROOT_PASSWORD" "secret" "secrets" "key" "DEVPI_ROOT_PASSWORD") | nindent 12 }}
          ports:
            - name: http
              containerPort: 8920
          # /healthz answers 200 even while syncs fail (fail-closed consumers
          # tolerate that); it only proves the HTTP surface is up.
          {{- include "artea.httpProbes" (dict "path" "/healthz") | nindent 10 }}
          {{- with .Values.policySync.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.policySync.persistence.enabled }}
          volumeMounts:
            - name: state
              mountPath: /var/lib/artea/policy-state
          {{- end }}
      {{- if .Values.policySync.persistence.enabled }}
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: {{ include "artea.fullname" "policy-sync-state" }}
      {{- end }}
---
{{ include "artea.service" (dict "ctx" $ "component" "policy-sync" "port" 8920) }}
