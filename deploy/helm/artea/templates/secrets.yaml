# Secrets rendered from .Values.secrets (dev placeholders — override for any
# non-throwaway install). Split into three so RBAC can stay narrow: the
# bootstrap Job's Role may get/patch ONLY artea-policy-sync.
apiVersion: v1
kind: Secret
metadata:
  # Name referenced statically by the Gitea subchart (gitea.admin.existingSecret).
  name: {{ include "artea.fullname" "admin" }}
  labels:
    {{- include "artea.labels" (dict "ctx" $ "component" "admin") | nindent 4 }}
type: Opaque
stringData:
  # Key names are the Gitea chart's existingSecret contract.
  username: {{ .Values.secrets.adminUsername | quote }}
  password: {{ .Values.secrets.adminPassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "artea.fullname" "secrets" }}
  labels:
    {{- include "artea.labels" (dict "ctx" $ "component" "secrets") | nindent 4 }}
type: Opaque
stringData:
  DEV1_PASSWORD: {{ .Values.secrets.dev1Password | quote }}
  DEVPI_ROOT_PASSWORD: {{ .Values.secrets.devpiRootPassword | quote }}
  POLICY_WEBHOOK_SECRET: {{ .Values.secrets.webhookSecret | quote }}
---
{{- /*
POLICY_SYNC_TOKEN is owned by the bootstrap Job (TOKEN_SINK=k8s-secret): it
mints a low-privilege svc-policy PAT in Gitea and patches it in here. Helm
must not clobber it on upgrade, so an existing in-cluster value is preserved
via lookup; the placeholder only appears on first install (and in `helm
template`, which has no cluster) — policy-sync idles with failing syncs until
the post-install bootstrap hook replaces it and restarts the Deployment.
*/}}
{{- $token := "bootstrap-pending" }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "artea.fullname" "policy-sync") }}
{{- if and $existing $existing.data (hasKey $existing.data "POLICY_SYNC_TOKEN") }}
{{- $token = index $existing.data "POLICY_SYNC_TOKEN" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "artea.fullname" "policy-sync" }}
  labels:
    {{- include "artea.labels" (dict "ctx" $ "component" "policy-sync") | nindent 4 }}
type: Opaque
stringData:
  POLICY_SYNC_TOKEN: {{ $token | quote }}
