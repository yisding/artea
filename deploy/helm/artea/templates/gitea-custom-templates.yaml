# Gitea custom/ overlay (de-gitted navbar + packages landing page), mounted
# over GITEA_CUSTOM/templates by the Gitea subchart (gitea.extraVolumes +
# gitea.extraContainerVolumeMounts in values.yaml).
#
# files/gitea-templates/ holds SYMLINKS to gitea/custom/templates/ (Helm follows
# them), so there is one source and nothing to keep in sync; the key
# base__head_navbar.tmpl is re-pathed to base/head_navbar.tmpl by the volume
# items (ConfigMap keys cannot contain '/').
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "artea.fullname" "gitea-custom-templates" }}
  labels:
    {{- include "artea.labels" (dict "ctx" $ "component" "gitea") | nindent 4 }}
data:
  home.tmpl: |
{{ .Files.Get "files/gitea-templates/home.tmpl" | replace "__ARTEA_NAMESPACE__" (include "artea.privateNamespace" .) | indent 4 }}
  base__head_navbar.tmpl: |
{{ .Files.Get "files/gitea-templates/base__head_navbar.tmpl" | replace "__ARTEA_NAMESPACE__" (include "artea.privateNamespace" .) | indent 4 }}
