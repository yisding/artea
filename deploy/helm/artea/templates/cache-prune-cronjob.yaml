{{- if .Values.cachePrune.enabled }}
# Generic cache-prune CronJob: bounds the DISPOSABLE Verdaccio (npm) and devpi
# (pypi) pull-through cache PVCs by deleting only old, regenerable cached
# artifacts. Both cache PVCs are ReadWriteOnce and already mounted by their
# cache pods, so a separate mounter is impossible; instead this Job runs kubectl
# and execs `find ... -delete` INSIDE each cache pod (mirroring the bootstrap
# exec pattern). It only ever removes regenerable cached files — never package
# metadata, never index/keyfs state, never directories — so a wiped file is
# simply re-fetched on the next pull-through. Disabled by default; opt in via
# cachePrune.enabled. Namespace-scoped, least-privilege RBAC.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "artea.fullname" "cache-prune" }}
  labels:
    {{- include "artea.labels" (dict "ctx" $ "component" "cache-prune") | nindent 4 }}
---
# Least privilege: read pods and exec into them, in this namespace only. Nothing
# cluster-wide; no other verbs or resources.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "artea.fullname" "cache-prune" }}
  labels:
    {{- include "artea.labels" (dict "ctx" $ "component" "cache-prune") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list]
  # NOTE: pods/exec cannot be scoped by resourceName in Kubernetes RBAC, so this
  # grants exec into ANY pod in the release namespace, not just the two cache
  # pods targeted below. It is the minimum viable RBAC for the exec-based pruner
  # (the RWO cache PVCs are already mounted by their pods, so a second mounter is
  # impossible). Tighter blast-radius must come from namespace isolation, not
  # from RBAC tightening.
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "artea.fullname" "cache-prune" }}
  labels:
    {{- include "artea.labels" (dict "ctx" $ "component" "cache-prune") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "artea.fullname" "cache-prune" }}
subjects:
  - kind: ServiceAccount
    name: {{ include "artea.fullname" "cache-prune" }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "artea.fullname" "cache-prune" }}
  labels:
    {{- include "artea.labels" (dict "ctx" $ "component" "cache-prune") | nindent 4 }}
spec:
  schedule: {{ .Values.cachePrune.schedule | quote }}
  {{- with .Values.cachePrune.timeZone }}
  # Without this the schedule runs in the controller-manager timezone (UTC on EKS).
  timeZone: {{ . | quote }}
  {{- end }}
  # Never overlap runs; if a scheduled start is missed by >5m, skip it.
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        {{- include "artea.labels" (dict "ctx" $ "component" "cache-prune") | nindent 8 }}
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            {{- include "artea.selectorLabels" (dict "ctx" $ "component" "cache-prune") | nindent 12 }}
        spec:
          serviceAccountName: {{ include "artea.fullname" "cache-prune" }}
          restartPolicy: Never
          containers:
            - name: cache-prune
              {{- include "artea.containerImage" .Values.cachePrune.image | nindent 14 }}
              env:
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
              {{- with .Values.cachePrune.resources }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              # Override the image ENTRYPOINT (bootstrap.sh) and run the prune.
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  # MAX_AGE is validated to a positive integer in
                  # templates/validations.yaml, so this interpolation can only ever
                  # be plain digits; the remote scripts reference the $MAX_AGE shell
                  # var (never re-template the literal into the find predicate).
                  MAX_AGE={{ .Values.cachePrune.maxAgeDays }}
                  NS="${POD_NAMESPACE}"
                  echo "artea cache-prune: starting (namespace=${NS}, maxAgeDays=${MAX_AGE})"

                  # Count of caches attempted and of caches that had no Running pod.
                  # A *total* miss is failed at the end (see below); a partial miss
                  # stays success so one down cache never masks the other.
                  EXPECTED=0
                  MISSES=0

                  # Name of a single Running pod for a label selector ("" if none).
                  # --request-timeout bounds the API call so a slow apiserver can't
                  # hang the Job.
                  resolve_pod() {
                    kubectl get pods -n "${NS}" -l "$1" \
                      --field-selector=status.phase=Running \
                      --request-timeout=30s \
                      -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true
                  }

                  # prune_cache <name> <selector> <container> <remote-sh-script>
                  # Resolve the cache pod and exec the prune script inside it.
                  # Tolerates a missing / zero-replica pod and a failing or HUNG
                  # prune: logs and moves on so one unavailable cache never fails
                  # the Job and never starves the other cache of the Job deadline.
                  prune_cache() {
                    cache="$1"; selector="$2"; container="$3"; script="$4"
                    EXPECTED=$((EXPECTED + 1))
                    pod="$(resolve_pod "${selector}")"
                    if [ -z "${pod}" ]; then
                      MISSES=$((MISSES + 1))
                      echo "[${cache}] WARNING: no Running pod for selector '${selector}'; skipping (cache NOT pruned)"
                      return 0
                    fi
                    echo "[${cache}] pruning in pod ${pod} (container ${container})"
                    # Bound the remote call. The bootstrap image is Debian, so
                    # coreutils `timeout` is present: it exits 124 on hang and falls
                    # into the else branch (WARNING + continue), so a wedged pod
                    # cannot consume the whole activeDeadlineSeconds and block the
                    # other cache. --request-timeout bounds the kubectl side too.
                    if timeout 180 kubectl exec --request-timeout=120s -n "${NS}" "${pod}" -c "${container}" -- /bin/sh -c "${script}"; then
                      echo "[${cache}] ok"
                    else
                      rc=$?
                      echo "[${cache}] WARNING: prune failed or timed out (exit ${rc}) in pod ${pod}; continuing"
                    fi
                  }

                  # Verdaccio: only cached upstream tarballs (*.tgz) are ever
                  # targeted — NEVER package.json (per-package metadata) or
                  # .verdaccio-db.json, and never directories (-type f). The glob is
                  # quoted so the remote shell does not expand it; find does the
                  # matching. -exec rm (not -delete) is portable to the BusyBox find
                  # in the alpine verdaccio image. find runs standalone (not piped to
                  # wc), so its exit status is checked and a partial failure surfaces
                  # instead of being masked. Deleted paths are echoed for audit.
                  VERDACCIO_PRUNE='set -u
                  MAX_AGE='"${MAX_AGE}"'
                  DIR=/verdaccio/storage/data
                  if [ ! -d "$DIR" ]; then
                    echo "[verdaccio] $DIR absent; nothing to prune"
                    exit 0
                  fi
                  if out=$(find "$DIR" -type f -name "*.tgz" -mtime +"$MAX_AGE" -print -exec rm -f -- {} +); then
                    n=0
                    if [ -n "$out" ]; then printf "%s\n" "$out"; n=$(printf "%s\n" "$out" | wc -l); fi
                    echo "[verdaccio] pruned $n cached tarball(s) (*.tgz) older than ${MAX_AGE}d under $DIR"
                  else
                    rc=$?
                    if [ -n "$out" ]; then printf "%s\n" "$out"; fi
                    echo "[verdaccio] ERROR: find/rm failed (exit $rc) under $DIR"
                    exit "$rc"
                  fi'

                  # devpi: only cached mirror release files under +files are
                  # deletable; devpi re-fetches them from PyPI on demand. The dir
                  # only appears after the first pull-through, so absence is normal
                  # (guarded, not an error). NEVER touch keyfs/index state
                  # (.sqlite, .event_serial, .nodeinfo, .serverversion, lost+found)
                  # or anything outside +files. Same find-status / -exec rm /
                  # audit-logging discipline as verdaccio above.
                  DEVPI_PRUNE='set -u
                  MAX_AGE='"${MAX_AGE}"'
                  DIR=/devpi/server/+files
                  if [ ! -d "$DIR" ]; then
                    echo "[devpi] $DIR absent (no pull-through yet); nothing to prune"
                    exit 0
                  fi
                  if out=$(find "$DIR" -type f -mtime +"$MAX_AGE" -print -exec rm -f -- {} +); then
                    n=0
                    if [ -n "$out" ]; then printf "%s\n" "$out"; n=$(printf "%s\n" "$out" | wc -l); fi
                    echo "[devpi] pruned $n cached mirror file(s) older than ${MAX_AGE}d under $DIR"
                  else
                    rc=$?
                    if [ -n "$out" ]; then printf "%s\n" "$out"; fi
                    echo "[devpi] ERROR: find/rm failed (exit $rc) under $DIR"
                    exit "$rc"
                  fi'

                  # Verdaccio selector uses the STABLE app.kubernetes.io/* labels
                  # (not the subchart's legacy `app=` label) for parity with devpi
                  # and resilience across verdaccio chart bumps.
                  prune_cache verdaccio {{ printf "app.kubernetes.io/name=verdaccio,app.kubernetes.io/instance=%s" .Release.Name | quote }} verdaccio "${VERDACCIO_PRUNE}"
                  prune_cache devpi {{ printf "app.kubernetes.io/name=artea,app.kubernetes.io/component=devpi,app.kubernetes.io/instance=%s" .Release.Name | quote }} devpi "${DEVPI_PRUNE}"

                  echo "artea cache-prune: finished (caches=${EXPECTED}, missed=${MISSES})"
                  # Surface a TOTAL miss (every expected cache had zero Running
                  # pods) as a Job failure so monitoring keyed on failedJobsHistory
                  # alerts — these are always-on singletons, so zero pods anywhere
                  # is abnormal. A partial miss stays success (handled above).
                  if [ "${EXPECTED}" -gt 0 ] && [ "${MISSES}" -eq "${EXPECTED}" ]; then
                    echo "artea cache-prune: ERROR: no cache pods were available; failing for visibility"
                    exit 1
                  fi
{{- end }}
