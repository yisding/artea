{{- if .Values.cachePrune.enabled }}
# Cache-prune CronJob (opt-in: cachePrune.enabled). Bounds the DISPOSABLE
# Verdaccio + devpi pull-through cache PVCs by mounting the cache volumes
# directly. It never receives Kubernetes API credentials, so it cannot exec into
# workloads elsewhere in the release namespace.
# Safety invariant: deletes only regenerable cached *files* — never package
# metadata, keyfs/index state, or directories.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "artea.fullname" "cache-prune" }}
  labels:
    {{- include "artea.labels" (dict "ctx" $ "component" "cache-prune") | nindent 4 }}
spec:
  schedule: {{ .Values.cachePrune.schedule | quote }}
  {{- with .Values.cachePrune.timeZone }}
  timeZone: {{ . | quote }}
  {{- end }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        {{- include "artea.labels" (dict "ctx" $ "component" "cache-prune") | nindent 8 }}
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            {{- include "artea.selectorLabels" (dict "ctx" $ "component" "cache-prune") | nindent 12 }}
        spec:
          automountServiceAccountToken: false
          restartPolicy: Never
          containers:
            - name: cache-prune
              {{- include "artea.containerImage" .Values.cachePrune.image | nindent 14 }}
              {{- with .Values.cachePrune.resources }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  # Validated to a positive integer (validations.yaml), so it can
                  # never alter the `find -mtime` predicate.
                  MAX_AGE={{ .Values.cachePrune.maxAgeDays }}
                  echo "artea cache-prune: starting (maxAgeDays=${MAX_AGE})"

                  prune_verdaccio() {
                    dir=/cache/verdaccio/data
                    if [ ! -d "$dir" ]; then
                      echo "[verdaccio] $dir absent; nothing to prune"
                      return 0
                    fi
                    if out=$(find "$dir" -type f -name "*.tgz" -mtime +"$MAX_AGE" -print -exec rm -f -- {} +); then
                      n=0
                      if [ -n "$out" ]; then printf "%s\n" "$out"; n=$(printf "%s\n" "$out" | wc -l); fi
                      echo "[verdaccio] pruned $n cached tarball(s) (*.tgz) older than ${MAX_AGE}d under $dir"
                    else
                      rc=$?
                      if [ -n "$out" ]; then printf "%s\n" "$out"; fi
                      echo "[verdaccio] ERROR: find/rm failed (exit $rc) under $dir"
                      return "$rc"
                    fi
                  }

                  prune_devpi() {
                    dir=/cache/devpi/+files
                    if [ ! -d "$dir" ]; then
                      echo "[devpi] $dir absent (no pull-through yet); nothing to prune"
                      return 0
                    fi
                    if out=$(find "$dir" -type f -mtime +"$MAX_AGE" -print -exec rm -f -- {} +); then
                      n=0
                      if [ -n "$out" ]; then printf "%s\n" "$out"; n=$(printf "%s\n" "$out" | wc -l); fi
                      echo "[devpi] pruned $n cached mirror file(s) older than ${MAX_AGE}d under $dir"
                    else
                      rc=$?
                      if [ -n "$out" ]; then printf "%s\n" "$out"; fi
                      echo "[devpi] ERROR: find/rm failed (exit $rc) under $dir"
                      return "$rc"
                    fi
                  }

                  prune_verdaccio
                  prune_devpi
                  echo "artea cache-prune: finished"
              volumeMounts:
                - name: verdaccio-cache
                  mountPath: /cache/verdaccio
                - name: devpi-cache
                  mountPath: /cache/devpi
          volumes:
            - name: verdaccio-cache
              persistentVolumeClaim:
                claimName: {{ include "artea.fullname" "verdaccio" }}
            - name: devpi-cache
              persistentVolumeClaim:
                claimName: {{ include "artea.fullname" "devpi-data" }}
{{- end }}
