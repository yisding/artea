{{- if .Values.cachePrune.enabled }}
{{- $caches := list
  (dict "component" "verdaccio" "suffix" "verdaccio-cache-prune" "native" false "claim" (include "artea.fullname" "verdaccio") "dataDir" "data" "nameFilter" "-name '*.tgz' " "uid" 10001 "gid" 101 "fsGroup" 101 "selector" (dict "app.kubernetes.io/name" "verdaccio" "app.kubernetes.io/instance" .Release.Name))
  (dict "component" "devpi" "suffix" "devpi-cache-prune" "native" true "claim" (include "artea.fullname" "devpi-data") "dataDir" "+files" "nameFilter" "" "uid" 1000 "gid" 1000 "fsGroup" 1000) }}
{{- range $c := $caches }}
---
{{- if eq $c.component "verdaccio" }}
# Cache-prune CronJobs (opt-in: cachePrune.enabled) — one per DISPOSABLE
# pull-through cache (Verdaccio npm, devpi pypi). Each Job mounts ONLY its own
# cache PVC and is pinned (podAffinity) to the node already running that cache
# pod, so the ReadWriteOnce volume is mountable here (RWO permits multiple pods
# on the SAME node). It runs as the cache's own uid/gid so deletes on its files
# succeed, and carries NO Kubernetes API credentials
# (automountServiceAccountToken: false) — enabling cache hygiene therefore grants
# no pod-exec (or any other) API rights in the namespace.
# Safety invariant: deletes only regenerable cached *files* — never package
# metadata, keyfs/index state, or directories; a pruned file is simply re-fetched
# on the next pull-through.
{{- end }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "artea.fullname" $c.suffix }}
  labels:
    {{- include "artea.labels" (dict "ctx" $ "component" $c.component) | nindent 4 }}
spec:
  schedule: {{ $.Values.cachePrune.schedule | quote }}
  {{- with $.Values.cachePrune.timeZone }}
  timeZone: {{ . | quote }}
  {{- end }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        {{- include "artea.labels" (dict "ctx" $ "component" $c.component) | nindent 8 }}
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            {{- include "artea.selectorLabels" (dict "ctx" $ "component" $c.component) | nindent 12 }}
        spec:
          automountServiceAccountToken: false
          restartPolicy: Never
          securityContext:
            # run as the cache's own uid/gid so deletes on its files succeed
            runAsUser: {{ $c.uid }}
            runAsGroup: {{ $c.gid }}
            fsGroup: {{ $c.fsGroup }}
          # Co-locate with the cache pod so its ReadWriteOnce PVC is mountable
          # here (RWO allows multiple pods on one node). If the cache pod is
          # momentarily absent (e.g. mid-rollout) the run is skipped, not broken.
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - topologyKey: kubernetes.io/hostname
                  labelSelector:
                    matchLabels:
                      {{- if $c.native }}
                      {{- include "artea.selectorLabels" (dict "ctx" $ "component" $c.component) | nindent 22 }}
                      {{- else }}
                      {{- $c.selector | toYaml | nindent 22 }}
                      {{- end }}
          containers:
            - name: cache-prune
              {{- include "artea.containerImage" $.Values.cachePrune.image | nindent 14 }}
              {{- with $.Values.cachePrune.resources }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  # maxAgeDays is validated to a positive integer
                  # (validations.yaml), so it can never alter the find predicate.
                  MAX_AGE={{ $.Values.cachePrune.maxAgeDays }}
                  dir="/cache/{{ $c.dataDir }}"
                  echo "artea cache-prune [{{ $c.component }}]: starting (maxAgeDays=${MAX_AGE})"
                  if [ ! -d "$dir" ]; then
                    echo "[{{ $c.component }}] $dir absent (no pull-through yet); nothing to prune"
                    exit 0
                  fi
                  out=$(find "$dir" -type f {{ $c.nameFilter }}-mtime +"$MAX_AGE" -print -exec rm -f -- {} +)
                  n=0
                  if [ -n "$out" ]; then printf '%s\n' "$out"; n=$(printf '%s\n' "$out" | wc -l); fi
                  echo "[{{ $c.component }}] pruned $n cached file(s) older than ${MAX_AGE}d under $dir"
                  echo "artea cache-prune [{{ $c.component }}]: finished"
              volumeMounts:
                - name: cache
                  mountPath: /cache
          volumes:
            - name: cache
              persistentVolumeClaim:
                claimName: {{ $c.claim }}
{{- end }}
{{- end }}
