# Artea gateway for Kubernetes — the single public entrypoint (Service
# artea-gateway:80). Helm-templated copy of gateway/nginx.conf (compose is the
# reference; keep the two in sync when routing logic changes), delivered via
# ConfigMap into the stock `nginx` image (config + a small njs file, no fork,
# no custom image).
# Routing contract: docs/ARCHITECTURE.md ("Fixed contracts" + "Resolution flows").
#
# K8s adaptation: compose used Docker's embedded DNS with per-request variable
# resolution because container IPs change on re-creation. K8s Services have
# stable ClusterIPs (pods churn behind them), so upstream names are resolved
# once at startup via upstream{} blocks and no resolver is needed. nginx only
# needs a restart if a Service object itself is deleted and re-created — which
# Helm does to the gateway pods too.

worker_processes auto;
pid /var/run/nginx.pid;

# njs, for PEP 503 name normalization (js_set below): stock nginx has no
# lowercasing and no iterative regex replacement. The stock image ships this
# module under /etc/nginx/modules (-> /usr/lib/nginx/modules).
load_module modules/ngx_http_js_module.so;

# Stock image symlinks these to stdout/stderr; keep the paths.
error_log /var/log/nginx/error.log notice;

events {
    worker_connections 1024;
}

http {
    default_type application/octet-stream;

    log_format artea '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent rt=$request_time '
                     'upstream=$upstream_addr upstream_status=$upstream_status';
    access_log /var/log/nginx/access.log artea;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65s;
    server_tokens off;

    # Auth-result cache for the auth_request guard below: keyed on the raw
    # Authorization header, 200s only, 30s TTL — keeps PAT revocation latency well
    # inside the 60s budget (ARCHITECTURE.md S12) while sparing Gitea one auth
    # round-trip per pip request. Per-pod, in the ephemeral container layer.
    # Sized for tiny auth-subrequest replies ONLY; the enrichment cache below has
    # its own zone so large Simple-API JSON bodies never evict auth entries (that
    # would inflate the S12 revocation latency the auth caching is sized for).
    proxy_cache_path /var/cache/nginx/artea_auth levels=1:2 keys_zone=artea_auth:1m
                     max_size=8m inactive=2m use_temp_path=off;

    # Separate cache for PEP 700 enriched Simple-API JSON (the /_enrich subrequest
    # below). Enriched documents for popular packages are tens-to-hundreds of KB
    # (occasionally MB), so they get their own, larger store: co-locating them in
    # the 8m auth zone would constantly evict auth entries (breaking the S12
    # revocation budget) AND evict each other (making the enrich cache useless, so
    # the Gitea-probe + policy-sync + pypi.org round-trips would be paid per
    # request). inactive matches the 30s proxy_cache_valid so an unused entry is
    # reaped promptly rather than holding space for an idle minute.
    proxy_cache_path /var/cache/nginx/pypi_enrich levels=1:2 keys_zone=pypi_enrich:4m
                     max_size=256m inactive=30s use_temp_path=off;

    # $pypi_project = PEP 503-normalized form of the $pypi_project_raw location
    # capture (lowercase, [-_.]+ runs collapsed to '-'), evaluated lazily per
    # request. Exact transformation: pep503.js (same ConfigMap).
    js_import pep503 from /etc/nginx/njs/pep503.js;
    js_set $pypi_project pep503.normalize;

    # PEP 700 upload-time enrichment of the PyPI Simple API JSON surface. Only
    # the JSON path (Accept: application/vnd.pypi.simple.v1+json) is diverted
    # through this orchestrator; everything else keeps the byte-for-byte
    # Gitea-first/devpi-fallback routing below. See gateway/njs/pep700.js (same
    # ConfigMap).
    js_import pep700 from /etc/nginx/njs/pep700.js;

    # $pypi_wants_json = 1 when the client explicitly asked for the JSON Simple
    # API (PEP 691/700). Bare `application/json` is deliberately NOT matched so
    # browsers/curl never get diverted into enrichment.
    map $http_accept $pypi_wants_json {
        "~*application/vnd\.pypi\.simple\.(v1|latest)\+json" 1;
        default 0;
    }

    # $private_npm_uri = Gitea-side path for private npm scope traffic, derived from
    # $request_uri (raw request line, never decoded): the scoped path must reach
    # Gitea byte-for-byte — npm sends %2f/%2F in packument and publish URLs, and a
    # rewrite would operate on the decoded $uri and corrupt them (see the comment
    # above "location /"). First entry: packument/publish/tarball/unpublish paths;
    # second: the dist-tag API. The @ may arrive literal or %40-encoded; the query
    # string rides along inside $request_uri. Case-INsensitive (~*), matching the
    # private-scope location below: every case spelling of the namespace is forced
    # to Gitea — where a non-canonical case simply 404s — so no spelling of the
    # org scope can ever fall through to Verdaccio and its npmjs uplink; the
    # captured remainder keeps the client's original bytes. Empty ("") when the
    # raw URI has no matching form — the private-scope location rejects that case
    # instead of letting it fall through to Verdaccio or Gitea.
    map $request_uri $private_npm_uri {
        "~*^/npm(?<private_rest_a>/(?:@|%40){{ include "artea.privateNamespace" . }}(?:%2f|/).*)$"           /api/packages/{{ include "artea.privateNamespace" . }}/npm$private_rest_a;
        "~*^/npm(?<private_rest_b>/-/package/(?:@|%40){{ include "artea.privateNamespace" . }}(?:%2f|/).*)$" /api/packages/{{ include "artea.privateNamespace" . }}/npm$private_rest_b;
        default "";
    }

    # Cluster Service DNS names (values: gateway.upstreams.*). Resolved at
    # startup; see the K8s adaptation note at the top of this file.
    upstream artea_gitea       { server {{ .Values.gateway.upstreams.gitea }}; }
    upstream artea_verdaccio   { server {{ .Values.gateway.upstreams.verdaccio }}; }
    upstream artea_devpi       { server {{ .Values.gateway.upstreams.devpi }}; }
    upstream artea_policy_sync { server {{ .Values.gateway.upstreams.policySync }}; }

    server {
        listen 80;
        server_name _;

        # npm publish / twine upload of large artifacts pass through here.
        client_max_body_size 512m;

        # Streaming choices (rationale in gateway/README.md):
        # - proxy_buffering off: stream big tarballs/wheels directly, no temp-file
        #   spooling; cost: one upstream connection per slow client (fine internally).
        # - proxy_request_buffering off: stream uploads straight to Gitea instead of
        #   spooling up to 512m to disk first; needs HTTP/1.1 upstream.
        # The auth subrequest location re-enables buffering (proxy_cache needs it).
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Forwarded headers for every upstream. X-outside-url is devpi's documented
        # reverse-proxy mechanism (ignored by Gitea/Verdaccio). NOTE: a location that
        # declares its own proxy_set_header (only /_artea_auth) inherits none of these.
        proxy_set_header Host              $http_host;
        proxy_set_header Connection        "";
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-outside-url     $scheme://$http_host;

        # Clients may reach us through a port-forward on another port (8080);
        # relative redirects keep Location headers from dropping it.
        absolute_redirect off;
        # auth_request propagates only 401/403; other njs guard statuses become a
        # local 500. Guarded locations map those outages to package-surface 503s.
        error_page 500 = @artea_unavailable;

        # Encoded separators in the direct Gitea package API prefix can otherwise
        # miss the literal /api/packages/ locations below on some nginx builds and
        # fall through to the UI catch-all. Keep npm's encoded package-name
        # separator legal only after the literal /api/packages/<namespace>/npm/.
        if ($request_uri ~* "^/api%2fpackages(?:[/?#]|%2f|/)") { return 404 "not found\n"; }
        if ($request_uri ~* "^/api/packages%2f") { return 404 "not found\n"; }
        if ($request_uri ~* "^/api/packages/[^/%?#]+%2f") { return 404 "not found\n"; }
        if ($request_uri ~* "^/api/packages/[^/%?#]+/(?:npm|pypi)%2f") { return 404 "not found\n"; }

        # ---- npm: everything unscoped -> Verdaccio pull-through cache -------------
        # Verdaccio runs with url_prefix=/npm/ but serves at its root, so the prefix
        # is stripped (the pattern Verdaccio's reverse-proxy docs prescribe). The
        # auth_request guard fronts Verdaccio too ("anonymous access: none,
        # anywhere"): without it Verdaccio's service endpoints (/-/ping, /-/v1/search,
        # audit) answer anonymously. The Authorization header still passes through
        # untouched so Verdaccio's auth plugin can authorize npm-level access; npm
        # clients send it on every request (documented always-auth client config).
        # proxy_intercept_errors stays off here: Verdaccio's own 401/403 (e.g. the
        # policy middleware's tarball 403, S13) must reach the client unmodified —
        # error_page below only re-maps nginx-generated auth_request failures.
        location = /npm { return 301 /npm/; }
        location /npm/ {
            auth_request /_artea_auth;
            error_page 401 = @artea_unauthorized;
            error_page 403 = @artea_forbidden;
            error_page 500 = @artea_unavailable;
            rewrite ^/npm/(.*)$ /$1 break;
            proxy_pass http://artea_verdaccio;
        }

        # ---- npm: private scope -> Gitea (gateway scope routing, ADR-0002) ----------
        # Regex locations beat the /npm/ prefix above, so scoped traffic peels off
        # before Verdaccio (whose deny rule for the private scope is defense in depth).
        # Matched case-insensitively (~*) and explicitly covering both literal and
        # encoded @/scope-separator spellings. nginx does not turn %2f into "/" for
        # location matching in the live image, so publish/packument paths from npm
        # must match %2f here directly; tarball paths still match the literal "/"
        # form. Case variants of the scope must route to Gitea (404 there) rather
        # than falling through to Verdaccio's npmjs uplink.
        # The forwarded path comes from the $private_npm_uri map over the RAW
        # $request_uri, preserving %2f and the original case byte-for-byte; the
        # required scope separator (%2f or "/") keeps lookalike scopes out.
        # An empty map value means this scoped location matched but the raw URI fit
        # neither allowed form (for example encoded scope letters or double-encoded
        # separators) — reject so it reaches neither Verdaccio nor Gitea.
        # "if" + lone "return" is one of the safe if-patterns.
        # All methods route identically; the gateway guard proves org membership
        # and package scope before Gitea enforces package-specific permissions.
        location ~* ^/npm/(?:-/package/)?(?:@|%40){{ include "artea.privateNamespace" . }}(?:%2f|/) {
            auth_request /_artea_auth;
            error_page 401 = @artea_unauthorized;
            error_page 403 = @artea_forbidden;
            error_page 500 = @artea_unavailable;
            if ($private_npm_uri = "") { return 400; }
            proxy_pass http://artea_gitea$private_npm_uri;
        }

        # ---- PyPI simple index: private-first, public 404-fallback (R2) ------------
        location = /pypi/simple { return 301 /pypi/simple/; }

        # Full-index page (empty project name): Gitea has no list-all route, so the
        # only possible answer is devpi's mirror index — guarded like every other
        # devpi-bound path.
        location = /pypi/simple/ {
            auth_request /_artea_auth;
            error_page 401 = @artea_unauthorized;
            error_page 403 = @artea_forbidden;
            error_page 500 = @artea_unavailable;
            rewrite ^ /root/constrained/+simple/ break;
            proxy_pass http://artea_devpi;
        }

        # Precedence guarantee: ask Gitea's org index first; ONLY a Gitea 404 falls
        # through to the public mirror. A Gitea 200 means devpi/PyPI is never
        # consulted for that name — a private name fully shadows the public one.
        # The gateway canonicalizes before the lookup: the name is PEP 503-normalized
        # ($pypi_project, js_set above) so non-canonical spellings cannot dodge the
        # private shadow, and the trailing slash is appended internally (slash
        # optional in the pattern) so the fallback never depends on a devpi redirect
        # that would skip this precedence check.
        location ~ ^/pypi/simple/(?<pypi_project_raw>[^/]+)/?$ {
            auth_request /_artea_auth;

            proxy_intercept_errors on;        # let error_page act on Gitea's status
            error_page 404 = @public_pypi;
            error_page 401 = @artea_unauthorized;
            error_page 403 = @artea_forbidden;
            error_page 500 = @artea_unavailable;

            # JSON Simple API clients (pip --uploaded-prior-to, uv --exclude-newer,
            # poetry min-release-age) get a PEP 700 v1.1 page with upload-time via
            # the njs enrichment orchestrator. `last` re-dispatches to the internal
            # /_pypi_json_enrich location; the non-JSON path below is unchanged.
            if ($pypi_wants_json) { rewrite ^ /_pypi_json_enrich last; }

            rewrite ^ /api/packages/{{ include "artea.privateNamespace" . }}/pypi/simple/$pypi_project/ break;
            proxy_pass http://artea_gitea;
        }

        # PEP 700 enrichment entrypoint (internal; reached only via the JSON
        # diversion above, so auth has NOT yet run on this internal request —
        # re-assert it here unconditionally before any upstream is touched).
        location = /_pypi_json_enrich {
            internal;
            auth_request /_artea_auth;
            error_page 401 = @artea_unauthorized;
            error_page 403 = @artea_forbidden;
            error_page 500 = @artea_unavailable;
            js_content pep700.enrichRoute;
        }

        # Gitea-first PEP 503 probe for the JSON path: same private index the
        # non-JSON path queries, body discarded (we only need the status; the
        # HTML itself is re-fetched by policy-sync). Carries the client credential.
        # A regular internal location (not @named): njs r.subrequest() targets a
        # URI, it cannot dispatch to a named location.
        location = /_gitea_simple_probe {
            internal;
            proxy_pass http://artea_gitea/api/packages/{{ include "artea.privateNamespace" . }}/pypi/simple/$pypi_project/;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_request_body off;
        }

        # Enrichment subrequest -> policy-sync, which fetches the base PEP 691
        # list (devpi or Gitea) and returns a PEP 700 v1.1 document. Cached
        # briefly per (upstream,name,credential): the credential is in the key so
        # one user's private view never leaks to another (harmless for public).
        location = /_enrich {
            internal;
            proxy_pass http://artea_policy_sync/pypi/simple-enrich?upstream=$arg_upstream&name=$arg_name;
            proxy_set_header Authorization $http_authorization;
            proxy_buffering on;
            # Dedicated zone (NOT artea_auth): enriched bodies are large and must
            # never evict the auth cache the S12 budget relies on.
            proxy_cache pypi_enrich;
            proxy_cache_key "$arg_upstream|$arg_name|$http_authorization";
            proxy_cache_valid 200 30s;
            proxy_ignore_headers Cache-Control Expires Set-Cookie Vary;
        }

        # Fallback: ask devpi's constrained index with the SAME normalized name.
        # $pypi_project survives the internal redirect because no capturing regex
        # runs in between.
        location @public_pypi {
            rewrite ^ /root/constrained/+simple/$pypi_project/ break;
            # devpi receives the canonical form (normalized + trailing slash), so it
            # has no reason to redirect; if it ever does, route the client back
            # through the gateway's precedence check, never into /root/ directly.
            proxy_redirect ~*^(?:https?://[^/]+)?/root/constrained/\+simple/(.*)$ /pypi/simple/$1;
            proxy_pass http://artea_devpi;
        }

        # ---- devpi file downloads (URLs inside constrained simple pages) -----------
        # Clients legitimately reach only file/external-link routes generated by
        # devpi's constrained pages. Raw simple/index routes under /root/ stay
        # closed so users cannot browse the unfiltered root/pypi mirror or bypass
        # the Gitea-first private-name check. The njs guard asks Artea's devpi
        # plugin whether the mirror file is still allowed by the current
        # constrained-index policy, avoiding whole simple-page buffering in nginx.
        location ~ ^/root/pypi/\+(?:f|e)/ {
            set $artea_original_uri $uri;
            auth_request /_artea_pypi_file_guard;
            error_page 401 = @artea_unauthorized;
            error_page 403 = @artea_forbidden;
            error_page 500 = @artea_unavailable;
            proxy_pass http://artea_devpi;
        }
        location /root/ {
            return 404 "not found\n";
        }

        # ---- auth_request guard (R1) ------------------------------------------------
        # Every devpi-bound path (devpi has no auth of its own) and /npm/ (Verdaccio's
        # service endpoints would answer anonymously) is gated by njs subrequests to
        # Gitea carrying the client's credential. The product model is one org:
        # only members of the configured private namespace with Gitea accounts/PATs
        # may reach package surfaces at all, so this check validates PAT, org
        # membership, and package scope before any proxy backend sees the request.
        # Gitea still enforces package-specific read/write permissions afterward.
        location = /_artea_auth {
            internal;
            js_content pep503.auth;
        }

        location = /_artea_user {
            internal;
            proxy_pass http://artea_gitea/api/v1/user;
            proxy_method GET;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;

            proxy_buffering on;               # proxy_cache requires buffering
            proxy_cache artea_auth;
            proxy_cache_key "$http_authorization|user";
            proxy_cache_valid 200 30s;        # successes only; failures never cached
            proxy_ignore_headers Cache-Control Expires Set-Cookie Vary;
        }

        location ~ ^/_artea_org_member/(?<artea_member>[^/]+)$ {
            internal;
            proxy_pass http://artea_gitea/api/v1/orgs/{{ include "artea.privateNamespace" . }}/members/$artea_member;
            proxy_method GET;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;

            proxy_intercept_errors on;        # Gitea returns 404 for non-members
            error_page 404 = @artea_auth_forbidden;
            proxy_buffering on;               # proxy_cache requires buffering
            proxy_cache artea_auth;
            proxy_cache_key "$http_authorization|org|$artea_member";
            proxy_cache_valid 200 204 30s;    # successes only; failures never cached
            # Gitea API replies carry no-cache headers and cookies; ignore them so
            # the positive cache works.
            proxy_ignore_headers Cache-Control Expires Set-Cookie Vary;
        }

        location = /_artea_package_scope {
            internal;
            proxy_pass http://artea_gitea/api/v1/packages/{{ include "artea.privateNamespace" . }}/?type=pypi&limit=1;
            proxy_method GET;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;

            # This management API returns 200 with a possibly empty list for
            # package-scoped tokens; tokens without the package category fail
            # at Gitea's token-scope middleware.
            proxy_buffering on;               # proxy_cache requires buffering
            proxy_cache artea_auth;           # third auth leg: cache like the other two
            proxy_cache_key "$http_authorization|scope";
            proxy_cache_valid 200 30s;        # successes only; failures never cached
            proxy_ignore_headers Cache-Control Expires Set-Cookie Vary;
        }

        location @artea_auth_forbidden {
            internal;
            return 403;
        }

        location = /_artea_pypi_file_guard {
            internal;
            js_content pep503.pypiFileGuard;
        }

        location = /_artea_devpi_file_allowed {
            internal;
            proxy_buffering on;
            # devpi derives the project from the file path itself; the gateway
            # forwards only ?path= (no parsed project), so njs never has to guess.
            proxy_pass http://artea_devpi/+artea/file-allowed?path=$arg_path;
        }

        # pip needs a Basic challenge on 401 to retry with netrc/keyring credentials.
        location @artea_unauthorized {
            add_header WWW-Authenticate 'Basic realm="Artea"' always;
            return 401 "authentication required\n";
        }

        location @artea_forbidden {
            return 403 "forbidden\n";
        }

        location @artea_unavailable {
            return 503 "registry unavailable\n";
        }

        # Gateway-local liveness/readiness probe (no upstream involved). Gitea
        # reserves the top-level "/-/" namespace, so no user/org path can collide.
        location = /-/artea-gateway/health {
            access_log off;
            return 200 "ok\n";
        }

        # ---- Gitea package API: v1 is single-org npm + PyPI only --------------------
        location ^~ /api/packages/{{ include "artea.privateNamespace" . }}/npm/ {
            auth_request /_artea_auth;
            error_page 401 = @artea_unauthorized;
            error_page 403 = @artea_forbidden;
            error_page 500 = @artea_unavailable;
            proxy_pass http://artea_gitea;
        }
        location = /api/packages/{{ include "artea.privateNamespace" . }}/npm {
            auth_request /_artea_auth;
            error_page 401 = @artea_unauthorized;
            error_page 403 = @artea_forbidden;
            error_page 500 = @artea_unavailable;
            proxy_pass http://artea_gitea;
        }
        location ^~ /api/packages/{{ include "artea.privateNamespace" . }}/pypi/ {
            auth_request /_artea_auth;
            error_page 401 = @artea_unauthorized;
            error_page 403 = @artea_forbidden;
            error_page 500 = @artea_unavailable;
            proxy_pass http://artea_gitea;
        }
        location = /api/packages/{{ include "artea.privateNamespace" . }}/pypi {
            auth_request /_artea_auth;
            error_page 401 = @artea_unauthorized;
            error_page 403 = @artea_forbidden;
            error_page 500 = @artea_unavailable;
            proxy_pass http://artea_gitea;
        }
        location ^~ /api/packages/ {
            return 404 "not found\n";
        }

        # ---- everything else -> Gitea ----------------------------------------------
        # UI and /api/v1/... No rewrite here, so the raw client URI is forwarded
        # byte-for-byte. Package API routes are handled explicitly above so v1
        # exposes only the configured namespace's npm/PyPI surfaces.
        location / {
            proxy_pass http://artea_gitea;
        }
    }
}
