# Verdaccio config for Artea — read-only npm pull-through cache behind the
# gateway. Single source, rendered through Helm: Kubernetes mounts it via the
# artea-verdaccio-config ConfigMap. The filter-artea plugin receives the policy
# over HTTP via policy_url from policy-sync (no shared RWX volume); the plugin
# polls with ETag, keeps last-known-good in memory, and fails closed after a
# grace window.

# storage data dir (chart-managed PVC)
storage: /verdaccio/storage/data

# plugin dir; the loader resolves <dir>/verdaccio-<name> (emptyDir filled by the
# copy-plugins init container)
plugins: /verdaccio/plugins

# gateway serves us at <baseUrl>/npm/ and strips the prefix; url_prefix
# makes generated tarball/metadata URLs resolve back through it
url_prefix: /npm/

# no anonymous access anywhere (ARCHITECTURE.md auth model) — the web UI
# has no per-user auth gate in verdaccio 6, so it is disabled outright
web:
  enable: false

auth:
  # replaces htpasswd entirely: validates user:PAT against Gitea and maps
  # configured namespace org/team membership to groups
  auth-gitea:
    gitea_url: {{ include "artea.giteaUrl" . }}
    private_namespace: '{{ include "artea.privateNamespace" . }}'
    # Positive auth-cache TTL (ms). Every npm/pnpm request re-validates the PAT
    # against Gitea (/api/v1/user + paginated /user/orgs + /user/teams) unless a
    # fresh cache entry exists. The plugin default is 30s, which re-auths
    # mid-install on long installs (e.g. webpack ~43s) and serializes redundant
    # Gitea round-trips on Verdaccio's single event loop. Raised to 300s so one
    # install (and bursts of parallel tarball fetches) reuses a single
    # validation. Re-validation is kept (not disabled) for defense-in-depth;
    # the tradeoff is that a revoked PAT stays accepted here for up to this TTL.
    cache_ttl_ms: 300000

filters:
  # missing/unparsable policy FAILS CLOSED (public packages rejected)
  filter-artea:
    {{- include "artea.filterArteaConfig" . | nindent 4 }}

uplinks:
  npmjs:
    url: https://registry.npmjs.org/
    cache: true
    maxage: {{ .Values.verdaccio.uplink.maxage }}
    max_fails: 5
    fail_timeout: 5m

packages:
  # private scope: defense in depth. The gateway routes the configured
  # private scope to Gitea; if one is misconfigured we still deny everything
  # here — no access, no publish, no proxy, so private names never leak to
  # npmjs.
  '@{{ include "artea.privateNamespace" . }}/*':
    access: []
    publish: []
    unpublish: []

  # everything else: authenticated pull-through of npmjs. Publish is denied
  # for everyone — Verdaccio is read-only; the only writable surface is Gitea.
  '**':
    access: $authenticated
    publish: []
    unpublish: []
    proxy: npmjs

middlewares:
  # proxy `npm audit` to the uplink
  audit:
    enabled: true
  # same package as in filters: (one package, two plugin roles) — the
  # middleware 403s direct tarball downloads of blocked versions (S13) and
  # 503s them while the policy is unavailable (fail-closed, S15)
  filter-artea:
    {{- include "artea.filterArteaConfig" . | nindent 4 }}

server:
  keepAliveTimeout: 60

log: { type: stdout, format: pretty, level: info }
