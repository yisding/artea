apiVersion: v2
name: artea
description: >-
  Artea — private npm + PyPI registry with pull-through caching (Gitea +
  Verdaccio + devpi behind one nginx gateway). Umbrella chart: the official
  Gitea and Verdaccio charts plus Artea's own templates for devpi,
  policy-sync, the gateway and the bootstrap Job (docs/ARCHITECTURE.md,
  "Kubernetes deployment").
type: application
version: 0.1.2
# Tracks the Artea repo, not any single upstream component.
appVersion: "0.1.0"
home: https://github.com/yisding/artea
sources:
  - https://github.com/yisding/artea
keywords:
  - npm
  - pypi
  - registry
  - gitea
  - verdaccio
  - devpi
  - pull-through
  - private-registry
maintainers:
  - name: Artea maintainers
    url: https://github.com/yisding/artea
dependencies:
  # Official Gitea chart (https://gitea.com/gitea/helm-gitea), published as OCI.
  - name: gitea
    version: 12.6.0
    repository: oci://docker.gitea.com/charts
  # Official Verdaccio chart (https://github.com/verdaccio/charts). The chart's
  # own version (4.x) is decoupled from the Verdaccio app version: chart 4.31.0
  # ships appVersion 6.2.3, i.e. it IS a Verdaccio 6 chart, and 4.31.0 is the
  # latest release. The app version we actually run is pinned by
  # verdaccio.image.tag in values.yaml (6.7.2, the source) — not by
  # this chart version.
  - name: verdaccio
    version: 4.31.0
    repository: https://charts.verdaccio.org
